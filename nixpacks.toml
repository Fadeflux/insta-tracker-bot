# Nixpacks configuration for Railway.
# Adds Chromium browser dependency so puppeteer-core can launch a headless browser.
# Without this, the puppeteer scraper will fail with "Chrome not found".
#
# When deployed:
#   - Railway uses Nixpacks to build the project
#   - Nixpacks reads this file
#   - Chromium and required system fonts are installed alongside Node.js
#   - puppeteer-core uses /usr/bin/chromium-browser as the executable

[phases.setup]
nixPkgs = [
  "...",
  "chromium",
  "fontconfig",
  "freetype",
  "harfbuzz",
  "ca-certificates"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
