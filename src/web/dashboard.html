<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Tracker Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a28; --bg4: #222235;
  --pink: #e1306c; --pink2: #ff4081; --purple: #7c3aed; --blue: #3b82f6;
  --green: #10b981; --orange: #f59e0b; --red: #ef4444;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --glass: rgba(255,255,255,0.03); --glass2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06); --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
.login-wrap { display:flex; justify-content:center; align-items:center; min-height:100vh; background: radial-gradient(ellipse at top, #1a1030, var(--bg)); }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; width: 380px; backdrop-filter: blur(20px); box-shadow: var(--shadow); }
.login-card .logo { text-align: center; margin-bottom: 32px; }
.login-card .logo h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.login-card .logo p { color: var(--text3); font-size: 13px; margin-top: 4px; }
.login-card input { width:100%; padding:14px 16px; margin-bottom:14px; border:1px solid var(--border); border-radius:12px; background:var(--bg3); color:var(--text); font-size:14px; outline:none; transition: border 0.2s; }
.login-card input:focus { border-color: var(--pink); }
.login-card .btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--pink), var(--purple)); color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition: transform 0.2s, box-shadow 0.2s; }
.login-card .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(225,48,108,0.3); }
.login-err { color: var(--red); text-align:center; margin-top:12px; font-size:13px; display:none; }

/* DASHBOARD */
.app { display:none; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; backdrop-filter: blur(20px); }
.topbar .brand { font-size:18px; font-weight:800; background:linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.topbar .right { display:flex; align-items:center; gap:16px; }
.topbar .user { color:var(--text2); font-size:13px; padding:6px 14px; background:var(--bg3); border-radius:20px; }
.topbar .logout { padding:6px 14px; background:var(--bg4); color:var(--text2); border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:13px; transition: all 0.2s; }
.topbar .logout:hover { border-color: var(--pink); color: var(--pink); }

.nav { display:flex; gap:0; background:var(--bg2); padding:0 32px; border-bottom:1px solid var(--border); overflow-x:auto; }
.nav-item { padding:14px 24px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text3); border-bottom:2px solid transparent; transition: all 0.2s; white-space:nowrap; }
.nav-item.on { color:var(--pink); border-bottom-color:var(--pink); }
.nav-item:hover { color:var(--text); }

.main { padding:24px 32px; max-width:1400px; margin:0 auto; }

/* KPI Cards */
.kpis { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
.kpi { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px; position:relative; overflow:hidden; transition: transform 0.2s, box-shadow 0.2s; }
.kpi:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.kpi .glow { position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; opacity:0.08; }
.kpi .icon { font-size:20px; margin-bottom:8px; }
.kpi .val { font-size:28px; font-weight:800; line-height:1; }
.kpi .lbl { font-size:12px; color:var(--text3); margin-top:6px; font-weight:500; }
.kpi .trend { font-size:11px; margin-top:6px; font-weight:600; }
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:20px; }
.card h3 { font-size:15px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.card h3 .dot { width:8px; height:8px; border-radius:50%; background:var(--pink); }

/* Table */
.tbl { width:100%; border-collapse:separate; border-spacing:0; }
.tbl th { padding:10px 16px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3); background:var(--bg3); }
.tbl th:first-child { border-radius:8px 0 0 8px; }
.tbl th:last-child { border-radius:0 8px 8px 0; }
.tbl td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--border); }
.tbl tr { transition: background 0.15s; cursor:pointer; }
.tbl tr:hover { background:var(--glass2); }
.medal { font-size:18px; }
.ok { color:var(--green); font-weight:600; }
.warn { color:var(--orange); font-weight:600; }
.bad { color:var(--red); font-weight:600; }

/* Bar Chart */
.bars { display:flex; align-items:flex-end; gap:6px; height:200px; padding:8px 0; }
.bar-w { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; }
.bar-v { font-size:10px; color:var(--text2); margin-bottom:4px; font-weight:600; }
.bar { width:100%; border-radius:6px 6px 2px 2px; min-height:4px; transition: height 0.5s ease; }
.bar-l { font-size:9px; color:var(--text3); margin-top:6px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }

/* Line Chart */
.line-chart { position:relative; height:200px; margin:16px 0; }
.line-chart canvas { width:100%!important; height:100%!important; }

/* Gauge */
.gauge-wrap { display:flex; justify-content:center; padding:16px; }
.gauge { position:relative; width:120px; height:120px; }
.gauge svg { transform:rotate(-90deg); }
.gauge-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.gauge-text .pct { font-size:24px; font-weight:800; }
.gauge-text .sub { font-size:10px; color:var(--text3); }

/* Modal */
.modal-bg { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:center; backdrop-filter:blur(4px); }
.modal-bg.show { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:32px; width:90%; max-width:700px; max-height:85vh; overflow-y:auto; box-shadow: var(--shadow); }
.modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
.modal .close { cursor:pointer; font-size:20px; color:var(--text3); background:var(--bg3); border:none; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.modal .close:hover { color:var(--pink); }

/* Compare */
.compare-sel { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.compare-sel select { padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; }
.compare-sel button { padding:10px 20px; background:linear-gradient(135deg, var(--pink), var(--purple)); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }

/* Picker */
.picker { display:flex; gap:12px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
.picker input, .picker select { padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; }
.picker .btn-sm { padding:10px 20px; background:linear-gradient(135deg, var(--pink), var(--purple)); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }

/* Responsive */
@media(max-width:768px) {
  .main { padding:16px; }
  .topbar { padding:12px 16px; }
  .nav { padding:0 16px; }
  .kpis { grid-template-columns: repeat(2, 1fr); }
}

/* Animations */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease forwards; }
.fade-up-d1 { animation-delay: 0.05s; opacity:0; }
.fade-up-d2 { animation-delay: 0.1s; opacity:0; }
.fade-up-d3 { animation-delay: 0.15s; opacity:0; }
.fade-up-d4 { animation-delay: 0.2s; opacity:0; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginPage">
<div class="login-card">
  <div class="logo"><h1>Insta Tracker</h1><p>Dashboard de performance</p></div>
  <input type="text" id="username" placeholder="Nom d'utilisateur">
  <input type="password" id="password" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')doLogin()">
  <button class="btn" onclick="doLogin()">Se connecter</button>
  <p class="login-err" id="loginErr">Identifiants incorrects</p>
</div>
</div>

<!-- APP -->
<div class="app" id="app">
<div class="topbar">
  <div class="brand">Insta Tracker</div>
  <div class="right">
    <span class="user" id="curUser"></span>
    <button class="logout" onclick="doLogout()">Deconnexion</button>
  </div>
</div>
<div class="nav">
  <div class="nav-item on" onclick="go('rt',this)">Temps reel</div>
  <div class="nav-item" onclick="go('hist',this)">Historique</div>
  <div class="nav-item" onclick="go('lb',this)">Classement</div>
  <div class="nav-item" onclick="go('cmp',this)">Comparer</div>
</div>
<div class="main" id="content"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<script>
var T=localStorage.getItem('dt'),A='',VAS=[];
if(T)showApp();

function doLogin(){
  var u=document.getElementById('username').value,p=document.getElementById('password').value;
  fetch(A+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
  .then(function(r){return r.json()}).then(function(d){
    if(d.token){T=d.token;localStorage.setItem('dt',T);localStorage.setItem('du',d.username);showApp();}
    else{document.getElementById('loginErr').style.display='block';}
  }).catch(function(){document.getElementById('loginErr').style.display='block';});
}
function doLogout(){T=null;localStorage.removeItem('dt');localStorage.removeItem('du');location.reload();}
function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';document.getElementById('curUser').textContent=localStorage.getItem('du')||'';go('rt',document.querySelector('.nav-item'));}
function af(u){return fetch(A+u,{headers:{'X-Auth-Token':T}}).then(function(r){if(r.status===401){doLogout();throw new Error('x');}return r.json();});}
function go(t,el){document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('on');});if(el)el.classList.add('on');
  if(t==='rt')loadRT();else if(t==='hist')loadHist();else if(t==='lb')loadLB();else if(t==='cmp')loadCmp();}
function fm(n){return n==null?'0':Number(n).toLocaleString('fr-FR');}
function pct(a,b){if(!b||b===0)return'--';return Math.round((a/b)*100)+'%';}

// ?? REALTIME ??
function loadRT(){
  af('/api/today').then(function(d){
    var s=d.summaries,tv=0,tl=0,tc=0,tp=0;
    s.forEach(function(x){tv+=Number(x.total_views);tl+=Number(x.total_likes);tc+=Number(x.total_comments);tp+=Number(x.post_count);});
    VAS=s;
    var obj6=s.filter(function(x){return Number(x.post_count)>=6;}).length;
    var pct6=s.length?Math.round((obj6/s.length)*100):0;

    var h='<div class="kpis">';
    h+=kpi('??',''+s.length,'VA actifs','--','pink');
    h+=kpi('??',''+tp,'Posts total','Objectif: '+s.length*6,'blue');
    h+=kpi('???',fm(tv),'Vues totales','--','purple');
    h+=kpi('??',fm(tl),'Likes totaux','--','pink');
    h+=kpi('??',fm(tc),'Commentaires','--','blue');
    h+=kpi('??',pct6+'%','Objectif 6 posts',obj6+'/'+s.length+' VA','green');
    h+='</div>';

    // Gauge
    h+='<div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:20px">';
    h+='<div class="card"><h3><span class="dot"></span>Completion</h3>';
    h+=gauge(pct6);
    h+='<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text3)">'+obj6+' sur '+s.length+' VA ont 6+ posts</div></div>';

    // Chart
    h+='<div class="card"><h3><span class="dot"></span>Vues par VA</h3><div class="bars">';
    var mx=Math.max.apply(null,s.map(function(x){return Number(x.total_views);}).concat([1]));
    s.forEach(function(x){
      var ht=Math.max(4,(Number(x.total_views)/mx)*170);
      var col=Number(x.post_count)>=6?'var(--green)':'var(--pink)';
      h+='<div class="bar-w"><div class="bar-v">'+fm(Number(x.total_views))+'</div><div class="bar" style="height:'+ht+'px;background:'+col+'"></div><div class="bar-l">'+x.va_name.split(' ')[0]+'</div></div>';
    });
    h+='</div></div></div>';

    // Best post
    if(s.length>0){
      var best=s[0];
      h+='<div class="card" style="border-left:3px solid var(--green)"><h3>? Meilleur VA du jour</h3>';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">';
      h+='<div><div style="font-size:20px;font-weight:800">'+best.va_name+'</div><div style="color:var(--text3);font-size:13px;margin-top:4px">'+best.post_count+' posts</div></div>';
      h+='<div style="display:flex;gap:24px">';
      h+='<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--purple)">'+fm(Number(best.total_views))+'</div><div style="font-size:11px;color:var(--text3)">vues</div></div>';
      h+='<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--pink)">'+fm(Number(best.total_likes))+'</div><div style="font-size:11px;color:var(--text3)">likes</div></div>';
      h+='<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--blue)">'+fm(Number(best.total_comments))+'</div><div style="font-size:11px;color:var(--text3)">commentaires</div></div>';
      h+='</div></div></div>';
    }

    // Table
    h+='<div class="card"><h3><span class="dot"></span>Tableau detaille</h3>';
    h+='<table class="tbl"><thead><tr><th>#</th><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Commentaires</th><th>Moy/post</th></tr></thead><tbody>';
    var medals=['??','??','??'];
    s.forEach(function(x,i){
      var m=i<3?medals[i]:''+(i+1);
      var pc=Number(x.post_count);
      var cls=pc>=6?'ok':pc>=3?'warn':'bad';
      var avg=pc>0?fm(Math.round(Number(x.total_views)/pc)):'0';
      h+='<tr onclick="openVA(\''+x.va_discord_id+'\',\''+x.va_name+'\')"><td class="medal">'+m+'</td><td><b>'+x.va_name+'</b></td><td class="'+cls+'">'+pc+'/6</td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+fm(Number(x.total_comments))+'</td><td>'+avg+'</td></tr>';
    });
    h+='</tbody></table></div>';

    document.getElementById('content').innerHTML=h;
  });
}

// ?? HISTORY ??
function loadHist(){
  var h='<div class="picker"><input type="number" id="hDays" value="7" min="1" max="30"><span style="color:var(--text3)">derniers jours</span><button class="btn-sm" onclick="loadHistData()">Charger</button></div><div id="histArea"><div style="color:var(--text3);padding:40px;text-align:center">Cliquez sur Charger</div></div>';
  document.getElementById('content').innerHTML=h;
  loadHistData();
}
function loadHistData(){
  var days=document.getElementById('hDays').value||7;
  af('/api/history/'+days).then(function(d){
    var daily=d.history.map(function(x){
      var tv=x.summaries.reduce(function(a,b){return a+Number(b.total_views);},0);
      var tl=x.summaries.reduce(function(a,b){return a+Number(b.total_likes);},0);
      return{date:x.date,views:tv,likes:tl,vas:x.summaries.length,summaries:x.summaries};
    }).reverse();

    var h='<div class="card"><h3><span class="dot"></span>Vues totales par jour</h3><div class="bars">';
    var mx=Math.max.apply(null,daily.map(function(x){return x.views;}).concat([1]));
    daily.forEach(function(x){
      var ht=Math.max(4,(x.views/mx)*170);
      h+='<div class="bar-w"><div class="bar-v">'+fm(x.views)+'</div><div class="bar" style="height:'+ht+'px;background:linear-gradient(to top,var(--pink),var(--purple))"></div><div class="bar-l">'+x.date.slice(5)+'</div></div>';
    });
    h+='</div></div>';

    h+='<div class="card"><h3><span class="dot"></span>Likes totaux par jour</h3><div class="bars">';
    var mxl=Math.max.apply(null,daily.map(function(x){return x.likes;}).concat([1]));
    daily.forEach(function(x){
      var ht=Math.max(4,(x.likes/mxl)*170);
      h+='<div class="bar-w"><div class="bar-v">'+fm(x.likes)+'</div><div class="bar" style="height:'+ht+'px;background:linear-gradient(to top,var(--blue),var(--green))"></div><div class="bar-l">'+x.date.slice(5)+'</div></div>';
    });
    h+='</div></div>';

    daily.forEach(function(x){
      if(x.summaries.length===0)return;
      h+='<div class="card"><h3><span class="dot"></span>'+x.date+'</h3><table class="tbl"><thead><tr><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Commentaires</th></tr></thead><tbody>';
      x.summaries.forEach(function(s){
        var cls=Number(s.post_count)>=6?'ok':'warn';
        h+='<tr><td><b>'+s.va_name+'</b></td><td class="'+cls+'">'+s.post_count+'/6</td><td>'+fm(Number(s.total_views))+'</td><td>'+fm(Number(s.total_likes))+'</td><td>'+fm(Number(s.total_comments))+'</td></tr>';
      });
      h+='</tbody></table></div>';
    });

    document.getElementById('histArea').innerHTML=h;
  });
}

// ?? LEADERBOARD ??
function loadLB(){
  var h='<div class="picker"><input type="date" id="lbDate" value="'+new Date().toISOString().split('T')[0]+'"><button class="btn-sm" onclick="loadLBData()">Charger</button></div><div id="lbArea"></div>';
  document.getElementById('content').innerHTML=h;
  loadLBData();
}
function loadLBData(){
  var date=document.getElementById('lbDate').value||new Date().toISOString().split('T')[0];
  af('/api/leaderboard?date='+date).then(function(d){
    var r=d.rankings;
    var h='<div class="card"><h3><span class="dot"></span>Classement du '+date+'</h3>';

    // Top 3 podium
    if(r.length>=3){
      h+='<div style="display:flex;justify-content:center;align-items:flex-end;gap:16px;margin:24px 0 32px;flex-wrap:wrap">';
      h+=podium(r[1],'??','140px','var(--text2)');
      h+=podium(r[0],'??','180px','var(--orange)');
      h+=podium(r[2],'??','120px','var(--orange)');
      h+='</div>';
    }

    h+='<table class="tbl"><thead><tr><th>#</th><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Commentaires</th><th>Republications</th><th>Moy/post</th></tr></thead><tbody>';
    var medals=['??','??','??'];
    r.forEach(function(x,i){
      var m=i<3?medals[i]:''+(i+1);
      var pc=Number(x.post_count);
      var cls=pc>=6?'ok':pc>=3?'warn':'bad';
      var avg=pc>0?fm(Math.round(Number(x.total_views)/pc)):'0';
      h+='<tr onclick="openVA(\''+x.va_discord_id+'\',\''+x.va_name+'\')"><td class="medal">'+m+'</td><td><b>'+x.va_name+'</b></td><td class="'+cls+'">'+pc+'/6</td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+fm(Number(x.total_comments))+'</td><td>'+fm(Number(x.total_shares))+'</td><td>'+avg+'</td></tr>';
    });
    h+='</tbody></table></div>';
    document.getElementById('lbArea').innerHTML=h;
  });
}

// ?? COMPARE ??
function loadCmp(){
  af('/api/today').then(function(d){
    VAS=d.summaries;
    var opts=VAS.map(function(v){return'<option value="'+v.va_discord_id+'">'+v.va_name+'</option>';}).join('');
    var h='<div class="compare-sel"><select id="cVa1">'+opts+'</select><span style="color:var(--text3);align-self:center">VS</span><select id="cVa2">'+opts+'</select><select id="cDays"><option value="7">7 jours</option><option value="14">14 jours</option><option value="30">30 jours</option></select><button onclick="loadCmpData()">Comparer</button></div><div id="cmpArea"><div style="color:var(--text3);padding:40px;text-align:center">Selectionnez 2 VA et cliquez Comparer</div></div>';
    document.getElementById('content').innerHTML=h;
    if(VAS.length>=2)document.getElementById('cVa2').selectedIndex=1;
  });
}
function loadCmpData(){
  var v1=document.getElementById('cVa1').value;
  var v2=document.getElementById('cVa2').value;
  var days=document.getElementById('cDays').value;
  var n1=document.getElementById('cVa1').options[document.getElementById('cVa1').selectedIndex].text;
  var n2=document.getElementById('cVa2').options[document.getElementById('cVa2').selectedIndex].text;
  af('/api/compare?va1='+v1+'&va2='+v2+'&days='+days).then(function(d){
    var h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';

    // VA1 card
    var s1=d.va1.find(function(x){return x.stats;});
    var s2=d.va2.find(function(x){return x.stats;});
    h+='<div class="card" style="border-top:3px solid var(--pink)"><h3>'+n1+'</h3>';
    if(s1&&s1.stats)h+=cmpStats(s1.stats);else h+='<p style="color:var(--text3)">Pas de donnees</p>';
    h+='</div>';
    h+='<div class="card" style="border-top:3px solid var(--blue)"><h3>'+n2+'</h3>';
    if(s2&&s2.stats)h+=cmpStats(s2.stats);else h+='<p style="color:var(--text3)">Pas de donnees</p>';
    h+='</div></div>';

    // Chart comparison
    h+='<div class="card"><h3><span class="dot"></span>Vues - Comparaison sur '+days+' jours</h3><div class="bars">';
    var all=d.va1.map(function(x,i){
      var v1v=x.stats?Number(x.stats.total_views):0;
      var v2v=d.va2[i].stats?Number(d.va2[i].stats.total_views):0;
      return{date:x.date,v1:v1v,v2:v2v};
    }).reverse();
    var mxc=Math.max.apply(null,all.map(function(x){return Math.max(x.v1,x.v2);}).concat([1]));
    all.forEach(function(x){
      var h1=Math.max(2,(x.v1/mxc)*80);
      var h2=Math.max(2,(x.v2/mxc)*80);
      h+='<div class="bar-w"><div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:170px"><div style="flex:1;height:'+h1+'px;background:var(--pink);border-radius:3px 3px 0 0"></div><div style="flex:1;height:'+h2+'px;background:var(--blue);border-radius:3px 3px 0 0"></div></div><div class="bar-l">'+x.date.slice(5)+'</div></div>';
    });
    h+='</div><div style="display:flex;gap:16px;justify-content:center;margin-top:12px"><span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)"><span style="width:12px;height:12px;border-radius:2px;background:var(--pink)"></span>'+n1+'</span><span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)"><span style="width:12px;height:12px;border-radius:2px;background:var(--blue)"></span>'+n2+'</span></div></div>';

    document.getElementById('cmpArea').innerHTML=h;
  });
}
function cmpStats(s){
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">'+
    '<div><div style="font-size:11px;color:var(--text3)">Posts</div><div style="font-size:20px;font-weight:700">'+s.post_count+'/6</div></div>'+
    '<div><div style="font-size:11px;color:var(--text3)">Vues</div><div style="font-size:20px;font-weight:700;color:var(--purple)">'+fm(Number(s.total_views))+'</div></div>'+
    '<div><div style="font-size:11px;color:var(--text3)">Likes</div><div style="font-size:20px;font-weight:700;color:var(--pink)">'+fm(Number(s.total_likes))+'</div></div>'+
    '<div><div style="font-size:11px;color:var(--text3)">Commentaires</div><div style="font-size:20px;font-weight:700;color:var(--blue)">'+fm(Number(s.total_comments))+'</div></div></div>';
}

// ?? VA DETAIL MODAL ??
function openVA(id,name){
  var date=new Date().toISOString().split('T')[0];
  if(document.getElementById('lbDate'))date=document.getElementById('lbDate').value||date;
  af('/api/va/'+id+'?date='+date).then(function(d){
    var h='<h2>'+name+' <button class="close" onclick="closeModal()">X</button></h2>';

    if(d.stats){
      h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">';
      h+='<div class="kpi" style="padding:14px"><div style="font-size:11px;color:var(--text3)">Posts</div><div style="font-size:18px;font-weight:700">'+d.stats.post_count+'/6</div></div>';
      h+='<div class="kpi" style="padding:14px"><div style="font-size:11px;color:var(--text3)">Vues</div><div style="font-size:18px;font-weight:700;color:var(--purple)">'+fm(Number(d.stats.total_views))+'</div></div>';
      h+='<div class="kpi" style="padding:14px"><div style="font-size:11px;color:var(--text3)">Likes</div><div style="font-size:18px;font-weight:700;color:var(--pink)">'+fm(Number(d.stats.total_likes))+'</div></div>';
      h+='<div class="kpi" style="padding:14px"><div style="font-size:11px;color:var(--text3)">Commentaires</div><div style="font-size:18px;font-weight:700;color:var(--blue)">'+fm(Number(d.stats.total_comments))+'</div></div>';
      h+='</div>';
    }

    d.posts.forEach(function(p,idx){
      h+='<div class="card" style="margin-bottom:12px"><h3>Post '+(idx+1)+' ? '+p.post.ig_post_id+'</h3>';
      h+='<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Publie: '+new Date(p.post.created_at).toLocaleString('fr-FR')+'</div>';

      if(p.snapshots.length>1){
        h+='<div class="bars" style="height:120px">';
        var mxv=Math.max.apply(null,p.snapshots.map(function(s){return Number(s.views);}).concat([1]));
        p.snapshots.forEach(function(s){
          var ht=Math.max(2,(Number(s.views)/mxv)*100);
          var time=new Date(s.scraped_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
          h+='<div class="bar-w"><div class="bar-v">'+s.views+'</div><div class="bar" style="height:'+ht+'px;background:var(--purple)"></div><div class="bar-l">'+time+'</div></div>';
        });
        h+='</div>';
      }

      var last=p.snapshots[p.snapshots.length-1];
      if(last){
        h+='<div style="display:flex;gap:16px;margin-top:12px;font-size:13px">';
        h+='<span>??? '+last.views+'</span><span>?? '+last.likes+'</span><span>?? '+last.comments+'</span><span>?? '+last.shares+'</span>';
        h+='</div>';
      }
      h+='</div>';
    });

    if(d.posts.length===0)h+='<p style="color:var(--text3);text-align:center;padding:20px">Aucun post ce jour</p>';

    document.getElementById('modalContent').innerHTML=h;
    document.getElementById('modalBg').classList.add('show');
  });
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}

// ?? HELPERS ??
function kpi(icon,val,lbl,trend,color){
  var colors={pink:'var(--pink)',blue:'var(--blue)',purple:'var(--purple)',green:'var(--green)',orange:'var(--orange)'};
  var c=colors[color]||'var(--pink)';
  return '<div class="kpi fade-up"><div class="glow" style="background:'+c+'"></div><div class="icon">'+icon+'</div><div class="val" style="color:'+c+'">'+val+'</div><div class="lbl">'+lbl+'</div>'+(trend&&trend!=='--'?'<div class="trend">'+trend+'</div>':'')+'</div>';
}
function gauge(pct){
  var r=52,c=2*Math.PI*r,off=c-(pct/100)*c;
  var col=pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)';
  return '<div class="gauge-wrap"><div class="gauge"><svg width="120" height="120"><circle cx="60" cy="60" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="10"/><circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="10" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/></svg><div class="gauge-text"><div class="pct" style="color:'+col+'">'+pct+'%</div><div class="sub">objectif</div></div></div></div>';
}
function podium(va,medal,h,borderCol){
  return '<div style="text-align:center;width:140px"><div style="font-size:32px;margin-bottom:8px">'+medal+'</div><div style="background:var(--bg3);border-radius:12px 12px 0 0;height:'+h+';display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px;border-top:3px solid '+borderCol+'"><div style="font-weight:700;font-size:14px">'+va.va_name+'</div><div style="font-size:20px;font-weight:800;color:var(--purple);margin-top:4px">'+fm(Number(va.total_views))+'</div><div style="font-size:10px;color:var(--text3)">vues</div><div style="font-size:13px;font-weight:600;color:var(--pink);margin-top:4px">'+fm(Number(va.total_likes))+' likes</div></div></div>';
}

// Auto refresh every 60s
setInterval(function(){var a=document.querySelector('.nav-item.on');if(a&&a.textContent==='Temps reel')loadRT();},60000);
</script>
