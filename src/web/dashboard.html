<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Tracker Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;--bg4:#222235;--pink:#e1306c;--pink2:#ff4081;--purple:#7c3aed;--blue:#3b82f6;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--viral:#ff00ff;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--shadow:0 8px 32px rgba(0,0,0,0.4)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at top,#1a1030,var(--bg))}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:380px;box-shadow:var(--shadow)}
.login-card .logo{text-align:center;margin-bottom:32px}
.login-card .logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .logo p{color:var(--text3);font-size:13px;margin-top:4px}
.login-card input{width:100%;padding:14px 16px;margin-bottom:14px;border:1px solid var(--border);border-radius:12px;background:var(--bg3);color:var(--text);font-size:14px;outline:none}
.login-card input:focus{border-color:var(--pink)}
.login-card .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.login-card .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(225,48,108,0.3)}
.login-err{color:var(--red);text-align:center;margin-top:12px;font-size:13px;display:none}
.app{display:none}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar .brand{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .right{display:flex;align-items:center;gap:16px}
.topbar .user{color:var(--text2);font-size:13px;padding:6px 14px;background:var(--bg3);border-radius:20px}
.topbar .logout{padding:6px 14px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px}
.topbar .logout:hover{border-color:var(--pink);color:var(--pink)}
.nav{display:flex;gap:0;background:var(--bg2);padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-item{padding:14px 24px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap}
.nav-item.on{color:var(--pink);border-bottom-color:var(--pink)}
.nav-item:hover{color:var(--text)}
.main{padding:24px 32px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:transform 0.2s}
.kpi:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.kpi .glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.08}
.kpi .icon{font-size:18px;margin-bottom:6px}
.kpi .val{font-size:24px;font-weight:800;line-height:1}
.kpi .lbl{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500}
.kpi .trend{font-size:10px;margin-top:5px;font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.card h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--pink)}
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);background:var(--bg3)}
.tbl th:first-child{border-radius:8px 0 0 8px}.tbl th:last-child{border-radius:0 8px 8px 0}
.tbl td{padding:11px 14px;font-size:12px;border-bottom:1px solid var(--border)}
.tbl tr{transition:background 0.15s;cursor:pointer}.tbl tr:hover{background:var(--glass2)}
.ok{color:var(--green);font-weight:600}.warn{color:var(--orange);font-weight:600}.bad{color:var(--red);font-weight:600}
.bars{display:flex;align-items:flex-end;gap:6px;height:200px;padding:8px 0}
.bar-w{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.bar-v{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:600}
.bar{width:100%;border-radius:6px 6px 2px 2px;min-height:4px;transition:height 0.5s ease}
.bar-l{font-size:9px;color:var(--text3);margin-top:6px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.gauge-wrap{display:flex;justify-content:center;padding:16px}
.gauge{position:relative;width:120px;height:120px}
.gauge svg{transform:rotate(-90deg)}
.gauge-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-text .pct{font-size:24px;font-weight:800}
.gauge-text .sub{font-size:10px;color:var(--text3)}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:90%;max-width:900px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal .close{cursor:pointer;font-size:20px;color:var(--text3);background:var(--bg3);border:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.modal .close:hover{color:var(--pink)}
.compare-sel{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.compare-sel select{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px}
.compare-sel button{padding:10px 20px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.picker{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.picker input,.picker select{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px}
.btn-sm{padding:10px 20px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.post-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.post-card .post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.post-card .post-link{color:var(--pink);text-decoration:none;font-size:12px;font-weight:600;padding:4px 12px;background:rgba(225,48,108,0.1);border-radius:6px;border:1px solid rgba(225,48,108,0.2)}
.post-card .post-link:hover{background:rgba(225,48,108,0.2)}
.post-card .post-stats{display:flex;gap:14px;font-size:12px;flex-wrap:wrap}
.post-card .post-stats span{display:flex;align-items:center;gap:4px}
.top-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.perf-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.perf-viral{background:rgba(255,0,255,0.15);color:#ff00ff;border:1px solid rgba(255,0,255,0.3)}
.perf-bon{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.perf-moyen{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.perf-flop{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.badge-top{background:rgba(255,215,0,0.12);color:#ffd700;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-bon{background:rgba(16,185,129,0.12);color:#10b981;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-faible{background:rgba(239,68,68,0.12);color:#ef4444;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.milestone{display:inline-flex;flex-direction:column;align-items:center;padding:8px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);min-width:70px}
.milestone .ms-val{font-size:16px;font-weight:700;color:var(--purple)}
.milestone .ms-lbl{font-size:9px;color:var(--text3);margin-top:2px}
@media(max-width:768px){.main{padding:16px}.topbar{padding:12px 16px}.nav{padding:0 16px}.kpis{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
<div class="login-card">
<div class="logo"><h1>Insta Tracker</h1><p>Dashboard de performance</p></div>
<input type="text" id="username" placeholder="Nom d'utilisateur">
<input type="password" id="password" placeholder="Mot de passe" onkeypress="if(event.key==='Enter')doLogin()">
<button class="btn" onclick="doLogin()">Se connecter</button>
<p class="login-err" id="loginErr">Identifiants incorrects</p>
</div>
</div>
<div class="app" id="app">
<div class="topbar">
<div class="brand">Insta Tracker</div>
<div class="right"><span class="user" id="curUser"></span><button class="logout" onclick="doLogout()">Deconnexion</button></div>
</div>
<div class="nav">
<div class="nav-item on" onclick="go('rt',this)">Temps reel</div>
<div class="nav-item" onclick="go('hist',this)">Historique</div>
<div class="nav-item" onclick="go('lb',this)">Classement</div>
<div class="nav-item" onclick="go('top',this)">Top Posts</div>
<div class="nav-item" onclick="go('reco',this)">Recommandations</div>
<div class="nav-item" onclick="go('saved',this)">Posts sauvegardes</div>
<div class="nav-item" onclick="go('cmp',this)">Comparer</div>
</div>
<div class="main" id="content"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>
<script>
var T=localStorage.getItem('dt'),A='',VAS=[];
if(T)showApp();
function doLogin(){var u=document.getElementById('username').value,p=document.getElementById('password').value;fetch(A+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.token){T=d.token;localStorage.setItem('dt',T);localStorage.setItem('du',d.username);showApp()}else{document.getElementById('loginErr').style.display='block'}}).catch(function(){document.getElementById('loginErr').style.display='block'})}
function doLogout(){T=null;localStorage.removeItem('dt');localStorage.removeItem('du');location.reload()}
function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';document.getElementById('curUser').textContent=localStorage.getItem('du')||'';go('rt',document.querySelector('.nav-item'))}
function af(u){return fetch(A+u,{headers:{'X-Auth-Token':T}}).then(function(r){if(r.status===401){doLogout();throw new Error('x')}return r.json()})}
function go(t,el){document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('on')});if(el)el.classList.add('on');if(t==='rt')loadRT();else if(t==='hist')loadHist();else if(t==='lb')loadLB();else if(t==='top')loadTop();else if(t==='reco')loadReco();else if(t==='saved')loadSaved();else if(t==='cmp')loadCmp()}
function fm(n){return n==null?'0':Number(n).toLocaleString('fr-FR')}
function perfBadge(p){var m={viral:'🔥 VIRAL',bon:'✅ BON',moyen:'➡️ MOYEN',flop:'⬇️ FLOP'};return'<span class="perf-badge perf-'+(p||'flop')+'">'+(m[p]||'⬇️ FLOP')+'</span>'}
function vaBadge(b){var m={top:'⭐ Top',bon:'👍 Bon',faible:'📉 Faible'};var c={top:'badge-top',bon:'badge-bon',faible:'badge-faible'};return'<span class="'+(c[b]||'badge-faible')+'">'+(m[b]||'📉 Faible')+'</span>'}
function perfColor(p){return{viral:'var(--viral)',bon:'var(--green)',moyen:'var(--orange)',flop:'var(--red)'}[p]||'var(--red)'}
function scoreOf(s){return(Number(s.likes)||0)+(Number(s.comments)||0)*3+(Number(s.shares)||0)*5}
function engOf(s){var v=Number(s.views)||0;if(!v)return 0;return((Number(s.likes)||0)+(Number(s.comments)||0))/v}
function perfOf(v){if(v>=5000)return'viral';if(v>=1000)return'bon';if(v>=300)return'moyen';return'flop'}

function loadRT(){
af('/api/today').then(function(d){
var s=d.summaries,tv=0,tl=0,tc=0,ts=0,tp=0,totalScore=0;
s.forEach(function(x){tv+=Number(x.total_views);tl+=Number(x.total_likes);tc+=Number(x.total_comments);ts+=Number(x.total_shares||0);tp+=Number(x.post_count);totalScore+=Number(x.total_score||0)});VAS=s;
var obj6=s.filter(function(x){return Number(x.post_count)>=6}).length;
var pct6=s.length?Math.round((obj6/s.length)*100):0;
var avgEng=tv>0?((tl+tc)/tv*100).toFixed(1):'0.0';
var h='<div class="kpis">';
h+=kpi('👥',''+s.length,'VA actifs','','pink');
h+=kpi('📝',''+tp,'Posts total','Obj: '+s.length*6,'blue');
h+=kpi('👁️',fm(tv),'Vues totales','','purple');
h+=kpi('❤️',fm(tl),'Likes totaux','','pink');
h+=kpi('💬',fm(tc),'Commentaires','','blue');
h+=kpi('🏆',fm(totalScore),'Score total','L+C×3+S×5','orange');
h+=kpi('📊',avgEng+'%','Engagement moy','(L+C)/V','green');
h+=kpi('🎯',pct6+'%','Objectif 6 posts',obj6+'/'+s.length+' VA','green');
h+='</div>';
h+='<div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:20px">';
h+='<div class="card"><h3><span class="dot"></span>Completion</h3>'+gauge(pct6)+'<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--text3)">'+obj6+' sur '+s.length+' VA ont 6+ posts</div></div>';
h+='<div class="card"><h3><span class="dot"></span>Vues par VA</h3><div class="bars">';
var mx=Math.max.apply(null,s.map(function(x){return Number(x.total_views)}).concat([1]));
s.forEach(function(x){var ht=Math.max(4,(Number(x.total_views)/mx)*170);var col=x.badge==='top'?'var(--green)':x.badge==='bon'?'var(--blue)':'var(--red)';h+='<div class="bar-w"><div class="bar-v">'+fm(Number(x.total_views))+'</div><div class="bar" style="height:'+ht+'px;background:'+col+'"></div><div class="bar-l">'+x.va_name.split(' ')[0]+'</div></div>'});
h+='</div></div></div>';
if(s.length>0){var best=s[0];h+='<div class="card" style="border-left:3px solid var(--green)"><h3>⭐ Meilleur VA du jour</h3><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px"><div><div style="font-size:20px;font-weight:800">'+best.va_name+' '+vaBadge(best.badge)+'</div><div style="color:var(--text3);font-size:13px;margin-top:4px">'+best.post_count+' posts | Score: '+fm(best.total_score)+' | Engagement: '+best.engagement_rate+'%</div></div><div style="display:flex;gap:24px"><div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--purple)">'+fm(Number(best.total_views))+'</div><div style="font-size:11px;color:var(--text3)">vues</div></div><div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--pink)">'+fm(Number(best.total_likes))+'</div><div style="font-size:11px;color:var(--text3)">likes</div></div><div style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--blue)">'+fm(Number(best.total_comments))+'</div><div style="font-size:11px;color:var(--text3)">commentaires</div></div></div></div></div>'}
h+='<div class="card"><h3><span class="dot"></span>Tableau detaille</h3><table class="tbl"><thead><tr><th>#</th><th>VA</th><th>Badge</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Comm.</th><th>Score</th><th>Engage.</th><th>Moy/post</th></tr></thead><tbody>';
s.forEach(function(x,i){var m=i<3?['🥇','🥈','🥉'][i]:''+(i+1);var pc=Number(x.post_count);var cls=pc>=6?'ok':pc>=3?'warn':'bad';var avg=pc>0?fm(Math.round(Number(x.total_views)/pc)):'0';h+='<tr onclick="openVA(\''+x.va_discord_id+'\',\''+x.va_name+'\')"><td>'+m+'</td><td><b>'+x.va_name+'</b></td><td>'+vaBadge(x.badge)+'</td><td class="'+cls+'">'+pc+'/6</td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+fm(Number(x.total_comments))+'</td><td style="color:var(--orange);font-weight:600">'+fm(x.total_score)+'</td><td>'+x.engagement_rate+'%</td><td>'+avg+'</td></tr>'});
h+='</tbody></table></div>';document.getElementById('content').innerHTML=h})}

function loadHist(){var h='<div class="picker"><input type="number" id="hDays" value="7" min="1" max="30"><span style="color:var(--text3)">derniers jours</span><button class="btn-sm" onclick="loadHistData()">Charger</button></div><div id="histArea"></div>';document.getElementById('content').innerHTML=h;loadHistData()}
function loadHistData(){var days=document.getElementById('hDays').value||7;af('/api/history/'+days).then(function(d){var daily=d.history.map(function(x){var tv=x.summaries.reduce(function(a,b){return a+Number(b.total_views)},0);var tl=x.summaries.reduce(function(a,b){return a+Number(b.total_likes)},0);var tc=x.summaries.reduce(function(a,b){return a+Number(b.total_comments)},0);return{date:x.date,views:tv,likes:tl,comments:tc,summaries:x.summaries}}).reverse();var h='<div class="card"><h3><span class="dot"></span>Vues totales par jour</h3><div class="bars">';var mx=Math.max.apply(null,daily.map(function(x){return x.views}).concat([1]));daily.forEach(function(x){var ht=Math.max(4,(x.views/mx)*170);h+='<div class="bar-w"><div class="bar-v">'+fm(x.views)+'</div><div class="bar" style="height:'+ht+'px;background:linear-gradient(to top,var(--pink),var(--purple))"></div><div class="bar-l">'+x.date.slice(5)+'</div></div>'});h+='</div></div>';h+='<div class="card"><h3><span class="dot"></span>Engagement par jour</h3><div class="bars">';var mxe=Math.max.apply(null,daily.map(function(x){return x.views>0?(x.likes+x.comments)/x.views*100:0}).concat([1]));daily.forEach(function(x){var eng=x.views>0?(x.likes+x.comments)/x.views*100:0;var ht=Math.max(4,(eng/mxe)*170);var col=eng>=5?'var(--green)':eng>=2?'var(--orange)':'var(--red)';h+='<div class="bar-w"><div class="bar-v">'+eng.toFixed(1)+'%</div><div class="bar" style="height:'+ht+'px;background:'+col+'"></div><div class="bar-l">'+x.date.slice(5)+'</div></div>'});h+='</div></div>';daily.forEach(function(x){if(x.summaries.length===0)return;h+='<div class="card"><h3><span class="dot"></span>'+x.date+'</h3><table class="tbl"><thead><tr><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Comm.</th></tr></thead><tbody>';x.summaries.forEach(function(s){var cls=Number(s.post_count)>=6?'ok':'warn';h+='<tr><td><b>'+s.va_name+'</b></td><td class="'+cls+'">'+s.post_count+'/6</td><td>'+fm(Number(s.total_views))+'</td><td>'+fm(Number(s.total_likes))+'</td><td>'+fm(Number(s.total_comments))+'</td></tr>'});h+='</tbody></table></div>'});document.getElementById('histArea').innerHTML=h})}

function loadLB(){var h='<div class="picker"><input type="date" id="lbDate" value="'+new Date().toISOString().split('T')[0]+'"><button class="btn-sm" onclick="loadLBData()">Charger</button></div><div id="lbArea"></div>';document.getElementById('content').innerHTML=h;loadLBData()}

h+='<div class="card"><h3><span class="dot" style="background:var(--green)"></span>Distribution des performances</h3><div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">';var cats=[{k:'viral',l:'🔥 Viral',c:'var(--viral)'},{k:'bon',l:'✅ Bon',c:'var(--green)'},{k:'moyen',l:'➡️ Moyen',c:'var(--orange)'},{k:'flop',l:'⬇️ Flop',c:'var(--red)'}];cats.forEach(function(cat){var pct=k.totalPosts>0?Math.round(k.perfCount[cat.k]/k.totalPosts*100):0;h+='<div style="flex:1;min-width:120px;background:var(--bg3);border-radius:10px;padding:14px;text-align:center;border-top:3px solid '+cat.c+'"><div style="font-size:24px;font-weight:800;color:'+cat.c+'">'+k.perfCount[cat.k]+'</div><div style="font-size:11px;color:var(--text3);margin-top:4px">'+cat.l+' ('+pct+'%)</div></div>'});h+='</div></div>';
// Nuggets (pepites a scaler)
if(d.nuggets.length>0){h+='<div class="card" style="border-top:3px solid var(--purple)"><h3>💎 Pepites a scaler</h3><p style="font-size:12px;color:var(--text3);margin-bottom:12px">Engagement > 1% mais vues faibles — ces posts meritent d\'etre repousses</p>';d.nuggets.forEach(function(p){var eng=p.engagement||engOf(p);var asc=p.advancedScore||advScore(p);h+='<div class="post-card" style="border-left:3px solid var(--purple)"><div class="post-header"><div><span style="font-weight:700">'+p.va_name+'</span> <span class="perf-badge" style="background:rgba(124,58,237,0.15);color:var(--purple);border:1px solid rgba(124,58,237,0.3)">💎 PEPITE</span>'+(p.caption?'<div style="font-size:11px;color:var(--text2);margin-top:4px;font-style:italic">"'+p.caption.substring(0,80)+'"</div>':'')+'</div><a href="'+p.url+'" target="_blank" class="post-link">Instagram ↗</a></div><div class="post-stats"><span>👁️ '+(p.views||0)+'</span><span>❤️ '+(p.likes||0)+'</span><span>💬 '+(p.comments||0)+'</span><span>📊 '+(eng*100).toFixed(1)+'%</span><span>⚡ Score: '+asc.toFixed(1)+'</span></div></div>'});h+='</div>'}
// Posts a reposter
if(d.postsToRepost.length>0){h+='<div class="card" style="border-top:3px solid var(--green)"><h3>🔁 Posts a reposter</h3><p style="font-size:12px;color:var(--text3);margin-bottom:12px">Ces posts ont bien performe — demandez aux VA de les refaire</p>';d.postsToRepost.forEach(function(p){var perf=perfOf(Number(p.views)||0);var asc=p.advancedScore||advScore(p);h+='<div class="post-card" style="border-left:3px solid '+perfColor(perf)+'"><div class="post-header"><div><span style="font-weight:700">'+p.va_name+'</span> '+perfBadge(perf)+(p.caption?'<div style="font-size:11px;color:var(--text2);margin-top:4px;font-style:italic">"'+p.caption.substring(0,80)+'"</div>':'')+'</div><a href="'+p.url+'" target="_blank" class="post-link">Instagram ↗</a></div><div class="post-stats"><span>👁️ '+(p.views||0)+'</span><span>❤️ '+(p.likes||0)+'</span><span>💬 '+(p.comments||0)+'</span><span>⚡ '+asc.toFixed(1)+'</span></div></div>'});h+='</div>'}
// VA a copier
if(d.topPerformers.length>0){h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';h+='<div class="card" style="border-top:3px solid var(--green)"><h3>⭐ VA a copier</h3>';d.topPerformers.forEach(function(v){h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:6px"><div style="font-weight:600;font-size:13px">'+v.va_name+'</div><div style="color:var(--green);font-weight:700">'+fm(Number(v.total_views))+' vues</div></div>'});h+='</div>';
// VA sous-performants
h+='<div class="card" style="border-top:3px solid var(--red)"><h3>⚠️ VA sous-performants</h3>';if(d.underperformers.length>0){d.underperformers.forEach(function(v){h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:6px"><div style="font-weight:600;font-size:13px">'+v.va_name+'</div><div style="color:var(--red);font-weight:700">'+fm(Number(v.total_views))+' vues</div></div>'})}else{h+='<p style="color:var(--text3);text-align:center;padding:12px">Tout le monde performe bien !</p>'}h+='</div></div>'}
document.getElementById('recoArea').innerHTML=h})}

function loadSaved(){var h='<div style="margin-bottom:16px"><input type="text" id="savedSearch" placeholder="Rechercher un VA ou une caption..." oninput="renderSaved()" style="width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none"></div><div id="savedArea"><p style="color:var(--text3);text-align:center;padding:40px">Chargement...</p></div>';document.getElementById('content').innerHTML=h;af('/api/saved-posts?limit=100').then(function(d){window.SAVED_DATA=d.posts;renderSaved()})}
function renderSaved(){var posts=window.SAVED_DATA||[];var search=(document.getElementById('savedSearch')?document.getElementById('savedSearch').value:'').toLowerCase().trim();if(search){posts=posts.filter(function(p){return(p.va_name||'').toLowerCase().indexOf(search)!==-1||(p.caption||'').toLowerCase().indexOf(search)!==-1})}var h='<div class="card"><h3><span class="dot" style="background:var(--green)"></span>'+posts.length+' meilleurs posts sauvegardes</h3><p style="font-size:12px;color:var(--text3);margin-bottom:16px">Posts avec performance BON ou VIRAL — a refaire par vos VA</p>';if(posts.length===0){h+='<p style="color:var(--text3);text-align:center;padding:20px">Aucun post sauvegarde</p>'}else{posts.forEach(function(p){var perf=p.perf||perfOf(Number(p.views)||0);var asc=p.advancedScore||advScore(p);var eng=p.engagement||engOf(p);h+='<div class="post-card" style="border-left:3px solid '+perfColor(perf)+'"><div class="post-header"><div><span style="font-weight:700;font-size:14px">'+p.va_name+'</span> '+perfBadge(perf)+'<div style="font-size:11px;color:var(--text3);margin-top:4px">'+p.ig_post_id+' | '+new Date(p.created_at).toLocaleString('fr-FR')+'</div>'+(p.caption?'<div style="font-size:12px;color:var(--text2);margin-top:6px;padding:6px 10px;background:var(--bg);border-radius:6px;font-style:italic">"'+p.caption+'"</div>':'')+'</div><a href="'+p.url+'" target="_blank" class="post-link">Instagram ↗</a></div><div class="post-stats"><span>👁️ '+(p.views||0)+'</span><span>❤️ '+(p.likes||0)+'</span><span>💬 '+(p.comments||0)+'</span><span>🏆 '+fm(p.score||0)+'</span><span>📊 '+(eng*100).toFixed(1)+'%</span><span>⚡ '+asc.toFixed(1)+'</span></div></div>'})}h+='</div>';document.getElementById('savedArea').innerHTML=h}

setInterval(function(){var a=document.querySelector('.nav-item.on');if(a&&a.textContent==='Temps reel')loadRT()},60000);
</script>
</body>
