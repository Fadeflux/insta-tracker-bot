<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Tracker Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }

.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #1a1a2e; padding: 40px; border-radius: 16px; width: 360px; }
.login-box h1 { color: #e1306c; margin-bottom: 24px; text-align: center; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #fff; font-size: 14px; }
.login-box button { width: 100%; padding: 12px; background: #e1306c; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.login-box button:hover { background: #c1255a; }
.login-error { color: #e74c3c; text-align: center; margin-top: 12px; display: none; }

.dashboard { display: none; }
.header { background: #1a1a2e; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e1306c; }
.header h1 { color: #e1306c; font-size: 20px; }
.header .user-info { display: flex; align-items: center; gap: 16px; }
.header button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }

.tabs { display: flex; gap: 0; background: #1a1a2e; padding: 0 32px; }
.tab { padding: 12px 24px; cursor: pointer; border-bottom: 3px solid transparent; color: #888; font-weight: 600; }
.tab.active { color: #e1306c; border-bottom-color: #e1306c; }
.tab:hover { color: #e1306c; }

.content { padding: 32px; max-width: 1200px; margin: 0 auto; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi-card { background: #1a1a2e; border-radius: 12px; padding: 20px; text-align: center; }
.kpi-card .value { font-size: 32px; font-weight: 700; color: #e1306c; }
.kpi-card .label { color: #888; margin-top: 4px; font-size: 14px; }

.va-table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
.va-table th { background: #16213e; padding: 12px 16px; text-align: left; color: #e1306c; font-size: 13px; }
.va-table td { padding: 12px 16px; border-bottom: 1px solid #222; font-size: 14px; }
.va-table tr:hover { background: #16213e; }

.medal { font-size: 18px; }
.status-ok { color: #2ecc71; }
.status-warn { color: #f39c12; }

.chart-container { background: #1a1a2e; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
.chart-container h3 { margin-bottom: 16px; color: #e1306c; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 200px; padding: 0 16px; }
.bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }
.bar { width: 100%; background: #e1306c; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
.bar-label { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
.bar-value { font-size: 11px; color: #e0e0e0; margin-bottom: 4px; }

.date-picker { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
.date-picker input { padding: 8px 12px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #fff; }
.date-picker button { padding: 8px 16px; background: #e1306c; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

.loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h1>Insta Tracker</h1>
    <input type="text" id="username" placeholder="Nom d'utilisateur">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="doLogin()">Connexion</button>
    <p class="login-error" id="loginError">Identifiants incorrects</p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboardPage">
  <div class="header">
    <h1>Insta Tracker Dashboard</h1>
    <div class="user-info">
      <span id="currentUser"></span>
      <button onclick="doLogout()">Deconnexion</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('realtime')">Temps reel</div>
    <div class="tab" onclick="showTab('history')">Historique</div>
    <div class="tab" onclick="showTab('leaderboard')">Classement</div>
  </div>

  <div class="content">
    <!-- REALTIME TAB -->
    <div id="tab-realtime">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div class="chart-container">
        <h3>Vues par VA aujourd'hui</h3>
        <div class="bar-chart" id="viewsChart"></div>
      </div>
      <table class="va-table">
        <thead><tr><th>#</th><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Commentaires</th></tr></thead>
        <tbody id="todayTable"></tbody>
      </table>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" style="display:none">
      <div class="date-picker">
        <input type="number" id="historyDays" value="7" min="1" max="30">
        <span>derniers jours</span>
        <button onclick="loadHistory()">Charger</button>
      </div>
      <div class="chart-container">
        <h3>Vues totales par jour</h3>
        <div class="bar-chart" id="historyChart"></div>
      </div>
      <div id="historyDetails"></div>
    </div>

    <!-- LEADERBOARD TAB -->
    <div id="tab-leaderboard" style="display:none">
      <div class="date-picker">
        <input type="date" id="leaderboardDate">
        <button onclick="loadLeaderboard()">Charger</button>
      </div>
      <table class="va-table">
        <thead><tr><th>#</th><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th><th>Commentaires</th><th>Republications</th></tr></thead>
        <tbody id="leaderboardTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var TOKEN = localStorage.getItem('dashboard_token');
var API = '';

if (TOKEN) showDashboard();

function doLogin() {
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.token) {
      TOKEN = data.token;
      localStorage.setItem('dashboard_token', TOKEN);
      localStorage.setItem('dashboard_user', data.username);
      showDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  })
  .catch(function() {
    document.getElementById('loginError').style.display = 'block';
  });
}

function doLogout() {
  TOKEN = null;
  localStorage.removeItem('dashboard_token');
  localStorage.removeItem('dashboard_user');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboardPage').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  document.getElementById('currentUser').textContent = localStorage.getItem('dashboard_user') || '';
  document.getElementById('leaderboardDate').value = new Date().toISOString().split('T')[0];
  loadToday();
}

function apiFetch(url) {
  return fetch(API + url, { headers: { 'X-Auth-Token': TOKEN } })
    .then(function(r) {
      if (r.status === 401) { doLogout(); throw new Error('Unauthorized'); }
      return r.json();
    });
}

function showTab(name) {
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('tab-realtime').style.display = name === 'realtime' ? 'block' : 'none';
  document.getElementById('tab-history').style.display = name === 'history' ? 'block' : 'none';
  document.getElementById('tab-leaderboard').style.display = name === 'leaderboard' ? 'block' : 'none';
  if (name === 'realtime') loadToday();
  if (name === 'history') loadHistory();
  if (name === 'leaderboard') loadLeaderboard();
}

function loadToday() {
  apiFetch('/api/today').then(function(data) {
    var s = data.summaries;
    var totalViews = s.reduce(function(a, b) { return a + Number(b.total_views); }, 0);
    var totalLikes = s.reduce(function(a, b) { return a + Number(b.total_likes); }, 0);
    var totalPosts = s.reduce(function(a, b) { return a + Number(b.post_count); }, 0);

    document.getElementById('kpiGrid').innerHTML =
      kpiCard(s.length, 'VA actifs') +
      kpiCard(totalPosts, 'Posts total') +
      kpiCard(fmtNum(totalViews), 'Vues totales') +
      kpiCard(fmtNum(totalLikes), 'Likes totaux') +
      kpiCard(data.activePosts, 'Posts en tracking');

    // Bar chart
    var maxViews = Math.max.apply(null, s.map(function(x) { return Number(x.total_views); }).concat([1]));
    document.getElementById('viewsChart').innerHTML = s.map(function(x) {
      var h = Math.max(4, (Number(x.total_views) / maxViews) * 180);
      return '<div class="bar-wrapper"><div class="bar-value">' + fmtNum(Number(x.total_views)) + '</div><div class="bar" style="height:' + h + 'px"></div><div class="bar-label">' + x.va_name.split(' ')[0] + '</div></div>';
    }).join('');

    // Table
    var medals = ['&#129351;', '&#129352;', '&#129353;'];
    document.getElementById('todayTable').innerHTML = s.map(function(x, i) {
      var medal = i < 3 ? medals[i] : (i + 1);
      var postClass = Number(x.post_count) >= 6 ? 'status-ok' : 'status-warn';
      return '<tr><td class="medal">' + medal + '</td><td>' + x.va_name + '</td><td class="' + postClass + '">' + x.post_count + '/6</td><td>' + fmtNum(Number(x.total_views)) + '</td><td>' + fmtNum(Number(x.total_likes)) + '</td><td>' + fmtNum(Number(x.total_comments)) + '</td></tr>';
    }).join('');
  });
}

function loadHistory() {
  var days = document.getElementById('historyDays').value || 7;
  apiFetch('/api/history/' + days).then(function(data) {
    var dailyTotals = data.history.map(function(d) {
      var total = d.summaries.reduce(function(a, b) { return a + Number(b.total_views); }, 0);
      return { date: d.date, views: total };
    }).reverse();

    var max = Math.max.apply(null, dailyTotals.map(function(x) { return x.views; }).concat([1]));
    document.getElementById('historyChart').innerHTML = dailyTotals.map(function(x) {
      var h = Math.max(4, (x.views / max) * 180);
      return '<div class="bar-wrapper"><div class="bar-value">' + fmtNum(x.views) + '</div><div class="bar" style="height:' + h + 'px"></div><div class="bar-label">' + x.date.slice(5) + '</div></div>';
    }).join('');

    document.getElementById('historyDetails').innerHTML = data.history.map(function(d) {
      if (d.summaries.length === 0) return '';
      var rows = d.summaries.map(function(s) {
        return '<tr><td>' + s.va_name + '</td><td>' + s.post_count + '</td><td>' + fmtNum(Number(s.total_views)) + '</td><td>' + fmtNum(Number(s.total_likes)) + '</td></tr>';
      }).join('');
      return '<div class="chart-container"><h3>' + d.date + '</h3><table class="va-table"><thead><tr><th>VA</th><th>Posts</th><th>Vues</th><th>Likes</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }).join('');
  });
}

function loadLeaderboard() {
  var date = document.getElementById('leaderboardDate').value || new Date().toISOString().split('T')[0];
  apiFetch('/api/leaderboard?date=' + date).then(function(data) {
    var medals = ['&#129351;', '&#129352;', '&#129353;'];
    document.getElementById('leaderboardTable').innerHTML = data.rankings.map(function(r, i) {
      var medal = i < 3 ? medals[i] : (i + 1);
      var postClass = Number(r.post_count) >= 6 ? 'status-ok' : 'status-warn';
      return '<tr><td class="medal">' + medal + '</td><td>' + r.va_name + '</td><td class="' + postClass + '">' + r.post_count + '/6</td><td>' + fmtNum(Number(r.total_views)) + '</td><td>' + fmtNum(Number(r.total_likes)) + '</td><td>' + fmtNum(Number(r.total_comments)) + '</td><td>' + fmtNum(Number(r.total_shares)) + '</td></tr>';
    }).join('');
  });
}

function kpiCard(value, label) {
  return '<div class="kpi-card"><div class="value">' + value + '</div><div class="label">' + label + '</div></div>';
}

function fmtNum(n) {
  return n.toLocaleString('fr-FR');
}

setInterval(loadToday, 60000);
</script>
</body>
</html>
