<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shinra Admin">
<title>Shinra Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060b;--bg2:#0d0d16;--bg3:#14142a;--bg4:#1c1c38;--pink:#e1306c;--purple:#7c3aed;--blue:#3b82f6;--twitter:#1da1f2;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--viral:#ff00ff;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:rgba(255,255,255,0.07);--glow:rgba(124,58,237,0.08);--accent:var(--pink);--accent2:var(--purple);--radius:16px;--radius-sm:10px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:10px}

/* Login */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.12),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(225,48,108,0.08),transparent 50%),var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:28px;padding:52px 44px;width:400px;backdrop-filter:blur(20px)}
.login-card .logo{text-align:center;margin-bottom:36px}
.login-card .logo h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .logo p{color:var(--text3);font-size:12px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.login-card input{width:100%;padding:15px 18px;margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-size:14px;outline:none;transition:border 0.2s}
.login-card input:focus{border-color:var(--purple)}
.login-card .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s}
.login-card .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.3)}
.login-err{color:var(--red);text-align:center;margin-top:14px;font-size:13px;display:none}

/* App shell */
.app{display:none}
.topbar{background:rgba(13,13,22,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar .brand{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}
.topbar .right{display:flex;align-items:center;gap:10px}
.topbar .user{color:var(--text2);font-size:12px;padding:6px 14px;background:var(--bg3);border-radius:20px;border:1px solid var(--border)}
.topbar .logout{padding:6px 14px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;transition:all 0.2s}
.topbar .logout:hover{border-color:var(--red);color:var(--red)}

/* Platform switch */
.plat-switch{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.plat-btn{padding:7px 18px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--bg3);color:var(--text3);transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.plat-btn.active-ig{background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff}
.plat-btn.active-tw{background:linear-gradient(135deg,var(--twitter),#0d8ecf);color:#fff}
.plat-btn.active-all{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
.plat-btn.active-gl{background:linear-gradient(135deg,#00c853,#00a844);color:#fff}
.plat-btn:hover:not(.active-ig):not(.active-tw):not(.active-all):not(.active-gl){color:var(--text);background:var(--bg4)}

/* Nav */
.nav{display:flex;gap:0;background:var(--bg2);padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-item{padding:15px 22px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.nav-item.on{color:var(--text);border-bottom-color:var(--accent)}
.nav-item:hover{color:var(--text)}

/* Main */
.main{padding:28px 32px;max-width:1440px;margin:0 auto}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:768px){
  /* Layout basics */
  body{font-size:14px}
  .main{padding:14px 10px 80px 10px}
  .topbar{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .topbar .brand{font-size:15px;flex:0 0 auto}
  .topbar .right{gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .topbar .user{font-size:10px;padding:4px 10px}
  .topbar .logout,.topbar #adminBtn{padding:4px 10px;font-size:10px}

  /* Nav: horizontal scrollable with subtle scrollbar hidden on touch */
  .nav{padding:0 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav-item{padding:12px 14px;font-size:11px}

  /* Platform switch: compact */
  .plat-switch{border-radius:6px}
  .plat-btn{padding:5px 10px;font-size:10px}

  /* KPIs: 2 columns on mobile (not auto-fit which can create 1-wide stacks) */
  .kpis{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
  .kpi{padding:14px 12px}
  .kpi .val{font-size:20px}
  .kpi .icon{font-size:14px;margin-bottom:6px}
  .kpi .lbl{font-size:9px}
  .kpi::after{width:60px;height:60px;top:-20px;right:-20px}

  /* Cards */
  .card{padding:16px 12px;margin-bottom:12px;border-radius:12px}
  .card h3{font-size:11px;margin-bottom:12px}

  /* Tables: horizontal scroll container instead of breaking the page */
  .card > .tbl,
  .card table.tbl{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;white-space:nowrap}
  .tbl th,.tbl td{padding:8px 10px;font-size:11px}
  .tbl th{font-size:9px}

  /* Dashboard: stack the 280px + 1fr split on mobile */
  .main .card + div[style*="grid-template-columns:280px 1fr"],
  div[style*="grid-template-columns:280px 1fr"]{grid-template-columns:1fr !important}

  /* Charts smaller */
  .chart-wrap{height:220px}
  .bars{height:160px}

  /* Modal: full-screen on mobile */
  .modal{max-width:calc(100vw - 20px);max-height:calc(100vh - 20px);padding:16px;border-radius:14px}
  .modal h2{font-size:17px}

  /* Filters: wrap buttons */
  .filters{flex-wrap:wrap;gap:6px}
  .btn-sm{padding:7px 12px;font-size:11px}

  /* Section title */
  .sec-title{font-size:10px;margin-bottom:10px}

  /* Login */
  .login-card{padding:36px 24px;margin:0 14px}
}

/* Even smaller screens (< 400px, very old phones) */
@media(max-width:400px){
  .kpis{grid-template-columns:1fr}
  .nav-item{padding:11px 10px}
  .topbar .brand{font-size:13px}
}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;position:relative;overflow:hidden;transition:all 0.25s}
.kpi:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.12);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.kpi .icon{font-size:16px;margin-bottom:8px;opacity:0.9}
.kpi .val{font-size:26px;font-weight:800;line-height:1;letter-spacing:-0.5px}
.kpi .lbl{font-size:10px;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.kpi .sub{font-size:9px;color:var(--text3);margin-top:3px}
.kpi::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:0.06}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:border 0.2s}
.card:hover{border-color:rgba(255,255,255,0.1)}
.card h3{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2)}
.card h3 .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Tables */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{padding:10px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);background:var(--bg3);border:none}
.tbl th:first-child{border-radius:8px 0 0 8px}.tbl th:last-child{border-radius:0 8px 8px 0}
.tbl td{padding:12px 14px;font-size:12px;border-bottom:1px solid var(--border)}
.tbl tr{transition:all 0.15s;cursor:pointer}.tbl tr:hover{background:rgba(124,58,237,0.05)}
.ok{color:var(--green);font-weight:700}.warn{color:var(--orange);font-weight:700}.bad{color:var(--red);font-weight:700}

/* Charts */
.chart-wrap{position:relative;height:280px;margin:12px 0}
.chart-wrap canvas{width:100%!important}

/* Bars */
.bars{display:flex;align-items:flex-end;gap:5px;height:200px;padding:8px 0}
.bar-w{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.bar-v{font-size:9px;color:var(--text3);margin-bottom:4px;font-weight:600}
.bar{width:100%;border-radius:6px 6px 2px 2px;min-height:4px;transition:height 0.6s ease}
.bar-l{font-size:8px;color:var(--text3);margin-top:6px;text-align:center}

/* Gauge */
.gauge-wrap{display:flex;justify-content:center;padding:16px}
.gauge{position:relative;width:110px;height:110px}
.gauge svg{transform:rotate(-90deg)}
.gauge-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-text .pct{font-size:22px;font-weight:800}
.gauge-text .gsub{font-size:9px;color:var(--text3)}

/* Buttons */
.btn-sm{padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-sm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,0.25)}
.btn-sm.btn-off{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.btn-sm.btn-off:hover{border-color:var(--accent);color:var(--text)}

/* Filters bar */
.filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.filters select,.filters input[type=date]{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border 0.2s}
.filters select:focus,.filters input[type=date]:focus{border-color:var(--purple)}
.filters input[type=text]{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;flex:1;min-width:180px}

/* Post cards */
.post-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:all 0.2s}
.post-card:hover{border-color:rgba(255,255,255,0.12)}
.post-card .post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.post-card .post-link{color:var(--accent);text-decoration:none;font-size:11px;font-weight:700;padding:5px 14px;border-radius:6px;border:1px solid;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.post-card .post-link:hover{opacity:0.8}
.post-card .post-stats{display:flex;gap:16px;font-size:11px;flex-wrap:wrap;color:var(--text2)}
.post-card .post-stats span{display:flex;align-items:center;gap:3px}

/* Performance badges */
.perf-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.perf-viral{background:rgba(255,0,255,0.12);color:#ff00ff;border:1px solid rgba(255,0,255,0.25)}
.perf-bon{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25)}
.perf-moyen{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25)}
.perf-flop{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.badge-top{background:rgba(255,215,0,0.1);color:#ffd700;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}
.badge-bon{background:rgba(16,185,129,0.1);color:#10b981;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}
.badge-faible{background:rgba(239,68,68,0.1);color:#ef4444;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}

/* Milestones */
.milestone{display:inline-flex;flex-direction:column;align-items:center;padding:10px 16px;background:var(--bg);border-radius:10px;border:1px solid var(--border);min-width:72px}
.milestone .ms-val{font-size:15px;font-weight:800;color:var(--purple)}
.milestone .ms-lbl{font-size:8px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:92%;max-width:1200px;max-height:88vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal .close{cursor:pointer;font-size:18px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal .close:hover{color:var(--red);border-color:var(--red)}

/* Section title */
.sec-title{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
<div class="login-card">
<div class="logo"><h1>Shinra Tracker</h1><p>Performance Dashboard</p></div>
<input type="text" id="username" placeholder="Utilisateur" autocomplete="username">
<input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()">
<button class="btn" onclick="doLogin()">Connexion</button>
<p class="login-err" id="loginErr">Identifiants incorrects</p>
</div>
</div>
<div class="app" id="app">
<div class="topbar">
<div class="brand" id="brandTitle">Shinra Tracker</div>
<div class="right">
<div class="plat-switch" id="platSwitch"></div>
<span class="user" id="curUser"></span>
<button id="adminBtn" style="display:none;padding:6px 14px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;transition:all 0.2s" onclick="openAdmin()">⚙️</button>
<button class="logout" onclick="doLogout()">Deconnexion</button>
</div>
</div>
<div class="nav">
<div class="nav-item on" onclick="go('dash',this)">Dashboard</div>
<div class="nav-item" onclick="go('lb',this)">Classement</div>
<div class="nav-item" onclick="go('top',this)">Top Posts</div>
<div class="nav-item" onclick="go('reco',this)">Recommandations</div>
<div class="nav-item" onclick="go('saved',this)">Pepites</div>
<div class="nav-item" onclick="go('heat',this)">Heures</div>
<div class="nav-item" onclick="go('evolution',this)">Evolution</div>
<div class="nav-item" onclick="go('accounts',this)">Comptes</div>
<div class="nav-item" onclick="go('global',this)">Global</div>
</div>
<div class="main" id="content"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<script>
var T=localStorage.getItem('dt'),A='',VAS=[];
var PLAT=localStorage.getItem('dp')||'instagram';
var ALLOWED_PLATS=JSON.parse(localStorage.getItem('dap')||'["instagram"]');
var USER_ROLE=localStorage.getItem('dr')||'va';
if(T)showApp();

function doLogin(){var u=document.getElementById('username').value,p=document.getElementById('password').value;fetch(A+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.token){T=d.token;localStorage.setItem('dt',T);localStorage.setItem('du',d.username);localStorage.setItem('dr',d.role||'va');localStorage.setItem('dap',JSON.stringify(d.allowedPlatforms||['instagram']));ALLOWED_PLATS=d.allowedPlatforms||['instagram'];USER_ROLE=d.role||'va';PLAT=ALLOWED_PLATS[0]||'instagram';localStorage.setItem('dp',PLAT);showApp()}else{document.getElementById('loginErr').style.display='block'}}).catch(function(){document.getElementById('loginErr').style.display='block'})}
function doLogout(){localStorage.clear();location.reload()}

function switchPlatform(p){PLAT=p;localStorage.setItem('dp',p);updatePlatUI();var cur=document.querySelector('.nav-item.on');if(cur){var tab=cur.getAttribute('data-tab')||'dash';go(tab,cur)}}

function updatePlatUI(){
var sw=document.getElementById('platSwitch');sw.innerHTML='';
var plats=ALLOWED_PLATS.slice();
if(ALLOWED_PLATS.length>1)plats.unshift('all');
plats.forEach(function(p){var b=document.createElement('button');b.className='plat-btn'+(PLAT===p?(p==='twitter'?' active-tw':p==='all'?' active-all':p==='geelark'?' active-gl':' active-ig'):'');b.textContent=p==='twitter'?'🐦 Twitter':p==='all'?'📊 Global':p==='geelark'?'📱 Geelark':'📸 Instagram';b.onclick=function(){switchPlatform(p)};sw.appendChild(b)});
var accentCol=PLAT==='twitter'?'var(--twitter)':PLAT==='all'?'var(--purple)':PLAT==='geelark'?'var(--green)':'var(--pink)';
document.documentElement.style.setProperty('--accent',accentCol);
var titles={instagram:'Shinra — Instagram',twitter:'Shinra — Twitter',geelark:'Shinra — Geelark Insta',all:'Shinra — Global'};
document.getElementById('brandTitle').textContent=titles[PLAT]||'Shinra Tracker'}

function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';document.getElementById('curUser').textContent=localStorage.getItem('du')||'';ALLOWED_PLATS=JSON.parse(localStorage.getItem('dap')||'["instagram"]');USER_ROLE=localStorage.getItem('dr')||'va';if(ALLOWED_PLATS.indexOf(PLAT)===-1)PLAT=ALLOWED_PLATS[0]||'instagram';updatePlatUI();if(USER_ROLE==='admin')document.getElementById('adminBtn').style.display='';go('dash',document.querySelector('.nav-item'))}

function af(u){var sep=u.indexOf('?')!==-1?'&':'?';var platParam=PLAT==='all'?'':sep+'platform='+PLAT;var url=A+u+(PLAT==='all'?'':platParam);return fetch(url,{headers:{'X-Auth-Token':T}}).then(function(r){if(r.status===401){doLogout();throw new Error('x')}return r.json()})}

function go(t,el){document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('on')});if(el){el.classList.add('on');el.setAttribute('data-tab',t)}
if(t==='dash')loadDash();else if(t==='lb')loadLB();else if(t==='top')loadTop();else if(t==='reco')loadReco();else if(t==='saved')loadSaved();else if(t==='heat')loadHeat();else if(t==='evolution')loadEvolution();else if(t==='accounts')loadAccounts();else if(t==='global')loadGlobal()}

// Helpers
function fm(n){return n==null?'0':Number(n).toLocaleString('fr-FR')}
function platEmoji(){return PLAT==='twitter'?'🐦':PLAT==='all'?'📊':PLAT==='geelark'?'📱':'📸'}
function platLabel(){return PLAT==='twitter'?'Twitter':PLAT==='all'?'Global':PLAT==='geelark'?'Geelark Insta':'Instagram'}
function platLinkLabel(p){p=p||PLAT;return p==='twitter'?'Twitter ↗':'Instagram ↗'}
function perfBadge(p){var m={viral:'🔥 VIRAL',bon:'✅ BON',moyen:'➡️ MOYEN',flop:'⬇️ FLOP'};return'<span class="perf-badge perf-'+(p||'flop')+'">'+(m[p]||'⬇️ FLOP')+'</span>'}
function vaBadge(b){var c={top:'badge-top',bon:'badge-bon',faible:'badge-faible'};var m={top:'⭐ Top',bon:'👍 Bon',faible:'📉 Faible'};return'<span class="'+(c[b]||'badge-faible')+'">'+(m[b]||'📉 Faible')+'</span>'}
function perfColor(p){return{viral:'#ff00ff',bon:'#10b981',moyen:'#f59e0b',flop:'#ef4444'}[p]||'#ef4444'}
function scoreOf(s){return(Number(s.likes)||0)+(Number(s.comments)||0)*3+(Number(s.shares)||0)*5}
function engOf(s){var v=Number(s.views)||0;if(!v)return 0;return((Number(s.likes)||0)+(Number(s.comments)||0))/v}
function perfOf(v){if(v>=5000)return'viral';if(v>=1000)return'bon';if(v>=300)return'moyen';return'flop'}
function kpi(icon,val,lbl,sub,color){var colors={pink:'var(--accent)',blue:'var(--blue)',purple:'var(--purple)',green:'var(--green)',orange:'var(--orange)',red:'var(--red)'};var c=colors[color]||'var(--accent)';return'<div class="kpi"><div class="icon">'+icon+'</div><div class="val" style="color:'+c+'">'+val+'</div><div class="lbl">'+lbl+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'<div style="position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:'+c+';opacity:0.05"></div></div>'}
function gauge(pct){var r=48,c=2*Math.PI*r,off=c-(pct/100)*c;var col=pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)';return'<div class="gauge-wrap"><div class="gauge"><svg width="110" height="110"><circle cx="55" cy="55" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="8"/><circle cx="55" cy="55" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/></svg><div class="gauge-text"><div class="pct" style="color:'+col+'">'+pct+'%</div><div class="gsub">objectif</div></div></div></div>'}
function dDate(offset){var d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().split('T')[0]}
function destroyCharts(){(window._charts||[]).forEach(function(c){try{c.destroy()}catch(e){}});window._charts=[]}
function makeChart(id,cfg){var ctx=document.getElementById(id);if(!ctx)return null;var ch=new Chart(ctx,cfg);window._charts=window._charts||[];window._charts.push(ch);return ch}

var s=d.summaries.map(function(x){var tv=Number(x.total_views),tl=Number(x.total_likes),tc=Number(x.total_comments),ts=Number(x.total_shares||0),pc=Number(x.post_count);x.avg_views=pc>0?Math.round(tv/pc):0;x.total_score=tl+tc*3+ts*5;x.engagement_rate=tv>0?((tl+tc)/tv*100).toFixed(1):'0.0';x.badge=x.avg_views>=2000?'top':x.avg_views>=500?'bon':'faible';return x}).sort(function(a,b){return Number(b.total_views)-Number(a.total_views)});

h+=kpi('👥',''+s.length,'VA actifs','','purple');
h+=kpi('📝',''+tp,'Posts','obj: '+s.length*6,'blue');
h+=kpi('👁️',fm(tv),'Vues','','purple');
h+=kpi('❤️',fm(tl),'Likes','','pink');
h+=kpi('💬',fm(tc),commLabel,'','blue');
h+=kpi(PLAT==='twitter'?'🔁':'🔄',fm(ts),rtLabel,'','purple');
h+=kpi('🏆',fm(tsc),'Score','L+C×3+S×5','orange');
h+=kpi('📊',avgEng+'%','Engagement','','green');
h+=kpi('🎯',pct6+'%','Objectif 6p',obj6+'/'+s.length,'green');
h+='</div>';

h+='<div style="display:grid;grid-template-columns:280px 1fr;gap:16px;margin-bottom:16px">';
h+='<div class="card"><h3><span class="dot"></span>Completion</h3>'+gauge(pct6)+'<div style="text-align:center;font-size:11px;color:var(--text3);margin-top:4px">'+obj6+'/'+s.length+' VA a 6+ posts</div></div>';
h+='<div class="card"><h3><span class="dot"></span>Vues par VA</h3><div class="chart-wrap"><canvas id="vaBarChart"></canvas></div></div>';

h+='<div class="card"><h3><span class="dot"></span>Tableau detaille</h3><table class="tbl"><thead><tr><th>#</th><th>VA</th><th>Badge</th><th>Posts</th><th>Vues</th><th>Likes</th><th>'+commLabel+'</th><th>'+rtLabel+'</th><th>Score</th><th>Eng.</th><th>Moy/p</th></tr></thead><tbody>';
s.forEach(function(x,i){var m=i<3?['🥇','🥈','🥉'][i]:''+(i+1);var pc=Number(x.post_count);var cls=pc>=6?'ok':pc>=3?'warn':'bad';var avg=pc>0?fm(Math.round(Number(x.total_views)/pc)):'0';h+='<tr onclick="openVA(\''+x.va_discord_id+'\',\''+x.va_name+'\')"><td>'+m+'</td><td><b>'+x.va_name+'</b></td><td>'+vaBadge(x.badge)+'</td><td class="'+cls+'">'+pc+'/6</td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+fm(Number(x.total_comments))+'</td><td>'+fm(Number(x.total_shares||0))+'</td><td style="color:var(--orange);font-weight:700">'+fm(x.total_score)+'</td><td>'+x.engagement_rate+'%</td><td>'+avg+'</td></tr>'});
h+='</tbody></table></div>';
document.getElementById('dashArea').innerHTML=h;

// Render bar chart
if(s.length>0){makeChart('vaBarChart',{type:'bar',data:{labels:s.map(function(x){return x.va_name.split(' ')[0]}),datasets:[{label:'Vues',data:s.map(function(x){return Number(x.total_views)}),backgroundColor:s.map(function(x){return x.badge==='top'?'rgba(16,185,129,0.7)':x.badge==='bon'?'rgba(59,130,246,0.7)':'rgba(239,68,68,0.5)'}),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10}}}}}})}

// Load streaks
af('/api/streaks').then(function(sd){var streaks=sd.streaks.filter(function(s){return s.current_streak>0||s.best_streak>0});if(streaks.length===0)return;var sh='<div class="card"><h3><span class="dot" style="background:var(--orange)"></span>Streaks '+platLabel()+'</h3><table class="tbl"><thead><tr><th>VA</th><th>Streak</th><th>Record</th><th>Status</th></tr></thead><tbody>';streaks.forEach(function(s){var badge=s.current_streak>=10?'🏆 Legendaire':s.current_streak>=5?'🔥 En feu':s.current_streak>=3?'⚡ Motive':s.current_streak>0?'✅ Actif':'💤';var col=s.current_streak>=5?'var(--green)':s.current_streak>=3?'var(--orange)':'var(--text2)';sh+='<tr><td><b>'+s.va_name+'</b></td><td style="color:'+col+';font-weight:700">'+s.current_streak+'j</td><td>'+s.best_streak+'j</td><td>'+badge+'</td></tr>'});sh+='</tbody></table></div>';document.getElementById('dashArea').innerHTML+=sh}).catch(function(){})})}

function loadMultiDay(days){destroyCharts();af('/api/history/'+days).then(function(d){
var daily=d.history.map(function(x){var tv=x.summaries.reduce(function(a,b){return a+Number(b.total_views)},0);var tl=x.summaries.reduce(function(a,b){return a+Number(b.total_likes)},0);var tc=x.summaries.reduce(function(a,b){return a+Number(b.total_comments)},0);var tp=x.summaries.reduce(function(a,b){return a+Number(b.post_count)},0);return{date:x.date,views:tv,likes:tl,comments:tc,posts:tp,score:tl+tc*3,eng:tv>0?(tl+tc)/tv*100:0}}).reverse();

makeChart('viewsLine',{type:'line',data:{labels:labels,datasets:[{label:'Vues',data:daily.map(function(x){return x.views}),borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,0.1)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#7c3aed'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b'}}}}});
makeChart('engLine',{type:'line',data:{labels:labels,datasets:[{label:'Engagement %',data:daily.map(function(x){return+x.eng.toFixed(2)}),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#10b981'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b'}}}}})})}

function loadTopData(){af('/api/top-posts?date='+document.getElementById('topDate').value).then(function(d){TOP_DATA=d.posts;var vas=[...new Set(d.posts.map(function(p){return p.va_name}))];var sel=document.getElementById('topVaSel');sel.innerHTML='<option value="all">Tous VA</option>';vas.forEach(function(v){sel.innerHTML+='<option>'+v+'</option>'});renderTop()})}
function renderTop(){var search=(document.getElementById('topSearch')||{value:''}).value.toLowerCase();var filtered=TOP_DATA.filter(function(p){var perf=p.perf||perfOf(Number(p.views)||0);if(TOP_F!=='all'&&perf!==TOP_F)return false;if(TOP_VA!=='all'&&p.va_name!==TOP_VA)return false;if(search&&p.va_name.toLowerCase().indexOf(search)===-1)return false;return true});
var h='<div class="card"><h3><span class="dot"></span>'+filtered.length+' post(s) — '+platLabel()+'</h3>';

if(filtered.length===0)h+='<p style="color:var(--text3);text-align:center;padding:30px">Aucun post</p>';
h+='</div>';document.getElementById('topArea').innerHTML=h}

// Re-focus the search input after render to not lose the keyboard focus
var si=document.getElementById('acc_search');
if(si&&document.activeElement!==si&&ACC_SEARCH){si.focus();var len=si.value.length;si.setSelectionRange(len,len);}
};
if(cachedData){renderFn(cachedData);return}
af('/api/accounts?status='+ACC_STATUS).then(renderFn).catch(function(e){document.getElementById('accArea').innerHTML='<div class="card" style="color:var(--red)">Erreur: '+(e.message||'chargement echoue')+'</div>'})}

function filterByVa(encodedName){
var name=decodeURIComponent(encodedName);
ACC_FILTER_VA=name;
ACC_SEARCH='';
loadAccountsData();
// Scroll to "Tous les comptes" after render
setTimeout(function(){var cards=document.querySelectorAll('#accArea .card');if(cards.length>=2){cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'start'})}},120);
}

function clearAccFilter(){
ACC_FILTER_VA=null;
ACC_SEARCH='';
loadAccountsData();
}

function onAccSearch(val){
ACC_SEARCH=val||'';
// Debounce — avoid re-render on every keystroke
if(_accSearchTimer)clearTimeout(_accSearchTimer);
_accSearchTimer=setTimeout(function(){renderAccountsOnly()},180);
}

// Re-render only the accounts table without re-fetching from API.
// Uses the last-fetched data cached in window._lastAccData.
function renderAccountsOnly(){
if(!window._lastAccData)return loadAccountsData();
loadAccountsData(window._lastAccData);
}

function toggleAccStatus(id,newStatus){
if(!confirm('Changer le statut du compte en "'+newStatus+'" ?'))return;
fetch(A+'/api/accounts/'+id+'/status',{method:'POST',headers:{'Content-Type':'application/json','X-Auth-Token':T},body:JSON.stringify({status:newStatus})})
.then(function(r){return r.json()}).then(function(d){if(d.success)loadAccountsData();else alert(d.error||'Erreur')}).catch(function(e){alert(e.message)})}

function sweepInactive(){
if(!confirm('Lancer un sweep des comptes inactifs maintenant ? Les comptes sans post depuis 7j seront marques inactifs.'))return;
fetch(A+'/api/accounts/sweep-inactive',{method:'POST',headers:{'Content-Type':'application/json','X-Auth-Token':T},body:JSON.stringify({})})
.then(function(r){return r.json()}).then(function(d){if(d.success){alert(d.flipped+' compte(s) marque(s) inactif(s).');loadAccountsData()}else alert(d.error||'Erreur')}).catch(function(e){alert(e.message)})}

// Build profile link button(s) based on platform.
// Instagram → instagram.com/{username}
// Twitter   → twitter.com/{username}
// Geelark   → 2 buttons (IG + TW) since Geelark accounts run on both platforms
function profileBtns(platform,username){
  if(!username)return '';
  var uname=String(username).replace(/^@/,'').trim();
  var igUrl='https://www.instagram.com/'+encodeURIComponent(uname)+'/';
  var twUrl='https://twitter.com/'+encodeURIComponent(uname);
  var baseStyle='display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;transition:all 0.15s;border:1px solid var(--border)';
  var igBtn='<a href="'+igUrl+'" target="_blank" rel="noopener" style="'+baseStyle+';background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;border-color:transparent">📸 Voir le profil Instagram ↗</a>';
  var twBtn='<a href="'+twUrl+'" target="_blank" rel="noopener" style="'+baseStyle+';background:#000;color:#fff;border-color:#333">🐦 Voir le profil Twitter ↗</a>';
  if(platform==='instagram')return igBtn;
  if(platform==='twitter')return twBtn;
  if(platform==='geelark')return igBtn;
  return '';
}

function openAccountDetail(id){
fetch(A+'/api/accounts/'+id+'?days=30',{headers:{'X-Auth-Token':T}}).then(function(r){return r.json()}).then(function(d){
if(d.error){alert(d.error);return}
var a=d.account,posts=d.posts||[];
var plEmj=a.platform==='twitter'?'🐦':a.platform==='geelark'?'📱':'📸';
var statusBadge=a.status==='active'?'<span class="ok">● Actif</span>':'<span class="bad">○ Inactif</span>';

var tp=posts.length,tv=0,tl=0,tc=0;
posts.forEach(function(p){tv+=Number(p.views)||0;tl+=Number(p.likes)||0;tc+=Number(p.comments)||0});
var avgV=tp>0?Math.round(tv/tp):0;

var h='<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;gap:16px"><div style="flex:1;min-width:0"><h2 style="font-size:22px;font-weight:800;margin-bottom:6px">'+plEmj+' @'+escapeHtml(a.username)+'</h2><div style="color:var(--text3);font-size:12px">'+a.platform+' · VA: '+escapeHtml(a.va_name||'-')+' · '+statusBadge+'</div><div style="color:var(--text3);font-size:11px;margin-top:4px">Ajoute le '+new Date(a.first_seen_at).toLocaleDateString('fr-FR')+' · Vu pour la derniere fois le '+new Date(a.last_seen_at).toLocaleDateString('fr-FR')+'</div><div style="margin-top:12px">'+profileBtns(a.platform,a.username)+'</div></div><div class="close" onclick="closeModal()">×</div></div>';

h+='<div class="kpis" style="margin-bottom:20px">';
h+=kpi('📝',''+tp,'Posts 30j','','blue');
h+=kpi('👁️',fm(tv),'Vues cumulees','','purple');
h+=kpi('❤️',fm(tl),'Likes','','pink');
h+=kpi('📊',fm(avgV),'Moy. vues/post','','green');
h+='</div>';

if(posts.length>0){
h+='<div class="sec-title">Posts recents (30j)</div>';
h+='<table class="tbl"><thead><tr><th>Date</th><th>Type</th><th>Vues</th><th>Likes</th><th>Comm.</th><th>Perf</th><th>Lien</th></tr></thead><tbody>';
posts.slice(0,50).forEach(function(p){
var dt=new Date(p.created_at);
var dtTxt=dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
h+='<tr><td>'+dtTxt+'</td><td style="font-size:10px;color:var(--text3);text-transform:uppercase">'+(p.post_type||'-')+'</td><td>'+fm(Number(p.views)||0)+'</td><td>'+fm(Number(p.likes)||0)+'</td><td>'+fm(Number(p.comments)||0)+'</td><td>'+perfBadge(p.perf)+'</td><td><a href="'+p.url+'" target="_blank" style="color:var(--accent);font-size:11px">↗</a></td></tr>';
});
h+='</tbody></table>';
if(posts.length>50)h+='<div style="text-align:center;color:var(--text3);font-size:11px;margin-top:10px">Affichage des 50 posts les plus recents sur '+posts.length+'</div>';
}else{
h+='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">Aucun post trouve sur 30 jours.</div>';
}

document.getElementById('modalContent').innerHTML=h;
document.getElementById('modalBg').classList.add('show');
}).catch(function(e){alert('Erreur: '+e.message)})}

function escapeHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

setInterval(function(){var a=document.querySelector('.nav-item.on');if(a&&(a.getAttribute('data-tab')==='dash')&&DASH_MODE==='today')loadDashData()},60000);
</script>
