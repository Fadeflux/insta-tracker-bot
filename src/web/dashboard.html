<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shinra Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060b;--bg2:#0d0d16;--bg3:#14142a;--bg4:#1c1c38;--pink:#e1306c;--purple:#7c3aed;--blue:#3b82f6;--twitter:#1da1f2;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--viral:#ff00ff;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:rgba(255,255,255,0.07);--glow:rgba(124,58,237,0.08);--accent:var(--pink);--accent2:var(--purple);--radius:16px;--radius-sm:10px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:10px}

/* Login */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,0.12),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(225,48,108,0.08),transparent 50%),var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:28px;padding:52px 44px;width:400px;backdrop-filter:blur(20px)}
.login-card .logo{text-align:center;margin-bottom:36px}
.login-card .logo h1{font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card .logo p{color:var(--text3);font-size:12px;margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.login-card input{width:100%;padding:15px 18px;margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-size:14px;outline:none;transition:border 0.2s}
.login-card input:focus{border-color:var(--purple)}
.login-card .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s}
.login-card .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,0.3)}
.login-err{color:var(--red);text-align:center;margin-top:14px;font-size:13px;display:none}

/* App shell */
.app{display:none}
.topbar{background:rgba(13,13,22,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.topbar .brand{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}
.topbar .right{display:flex;align-items:center;gap:10px}
.topbar .user{color:var(--text2);font-size:12px;padding:6px 14px;background:var(--bg3);border-radius:20px;border:1px solid var(--border)}
.topbar .logout{padding:6px 14px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;transition:all 0.2s}
.topbar .logout:hover{border-color:var(--red);color:var(--red)}

/* Platform switch */
.plat-switch{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.plat-btn{padding:7px 18px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--bg3);color:var(--text3);transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.plat-btn.active-ig{background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff}
.plat-btn.active-tw{background:linear-gradient(135deg,var(--twitter),#0d8ecf);color:#fff}
.plat-btn.active-all{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
.plat-btn:hover:not(.active-ig):not(.active-tw):not(.active-all){color:var(--text);background:var(--bg4)}

/* Nav */
.nav{display:flex;gap:0;background:var(--bg2);padding:0 32px;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-item{padding:15px 22px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.nav-item.on{color:var(--text);border-bottom-color:var(--accent)}
.nav-item:hover{color:var(--text)}

/* Main */
.main{padding:28px 32px;max-width:1440px;margin:0 auto}
@media(max-width:768px){.main{padding:16px}.topbar{padding:12px 16px}.nav{padding:0 12px}}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;position:relative;overflow:hidden;transition:all 0.25s}
.kpi:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.12);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.kpi .icon{font-size:16px;margin-bottom:8px;opacity:0.9}
.kpi .val{font-size:26px;font-weight:800;line-height:1;letter-spacing:-0.5px}
.kpi .lbl{font-size:10px;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.kpi .sub{font-size:9px;color:var(--text3);margin-top:3px}
.kpi::after{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:0.06}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:border 0.2s}
.card:hover{border-color:rgba(255,255,255,0.1)}
.card h3{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2)}
.card h3 .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}

/* Tables */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{padding:10px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);background:var(--bg3);border:none}
.tbl th:first-child{border-radius:8px 0 0 8px}.tbl th:last-child{border-radius:0 8px 8px 0}
.tbl td{padding:12px 14px;font-size:12px;border-bottom:1px solid var(--border)}
.tbl tr{transition:all 0.15s;cursor:pointer}.tbl tr:hover{background:rgba(124,58,237,0.05)}
.ok{color:var(--green);font-weight:700}.warn{color:var(--orange);font-weight:700}.bad{color:var(--red);font-weight:700}

/* Charts */
.chart-wrap{position:relative;height:280px;margin:12px 0}
.chart-wrap canvas{width:100%!important}

/* Bars */
.bars{display:flex;align-items:flex-end;gap:5px;height:200px;padding:8px 0}
.bar-w{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.bar-v{font-size:9px;color:var(--text3);margin-bottom:4px;font-weight:600}
.bar{width:100%;border-radius:6px 6px 2px 2px;min-height:4px;transition:height 0.6s ease}
.bar-l{font-size:8px;color:var(--text3);margin-top:6px;text-align:center}

/* Gauge */
.gauge-wrap{display:flex;justify-content:center;padding:16px}
.gauge{position:relative;width:110px;height:110px}
.gauge svg{transform:rotate(-90deg)}
.gauge-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-text .pct{font-size:22px;font-weight:800}
.gauge-text .gsub{font-size:9px;color:var(--text3)}

/* Buttons */
.btn-sm{padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-sm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,0.25)}
.btn-sm.btn-off{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.btn-sm.btn-off:hover{border-color:var(--accent);color:var(--text)}

/* Filters bar */
.filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.filters select,.filters input[type=date]{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;transition:border 0.2s}
.filters select:focus,.filters input[type=date]:focus{border-color:var(--purple)}
.filters input[type=text]{padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;flex:1;min-width:180px}

/* Post cards */
.post-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:all 0.2s}
.post-card:hover{border-color:rgba(255,255,255,0.12)}
.post-card .post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.post-card .post-link{color:var(--accent);text-decoration:none;font-size:11px;font-weight:700;padding:5px 14px;border-radius:6px;border:1px solid;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.post-card .post-link:hover{opacity:0.8}
.post-card .post-stats{display:flex;gap:16px;font-size:11px;flex-wrap:wrap;color:var(--text2)}
.post-card .post-stats span{display:flex;align-items:center;gap:3px}

/* Performance badges */
.perf-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.perf-viral{background:rgba(255,0,255,0.12);color:#ff00ff;border:1px solid rgba(255,0,255,0.25)}
.perf-bon{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.25)}
.perf-moyen{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25)}
.perf-flop{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.badge-top{background:rgba(255,215,0,0.1);color:#ffd700;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}
.badge-bon{background:rgba(16,185,129,0.1);color:#10b981;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}
.badge-faible{background:rgba(239,68,68,0.1);color:#ef4444;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700}

/* Milestones */
.milestone{display:inline-flex;flex-direction:column;align-items:center;padding:10px 16px;background:var(--bg);border-radius:10px;border:1px solid var(--border);min-width:72px}
.milestone .ms-val{font-size:15px;font-weight:800;color:var(--purple)}
.milestone .ms-lbl{font-size:8px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:92%;max-width:960px;max-height:88vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal .close{cursor:pointer;font-size:18px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal .close:hover{color:var(--red);border-color:var(--red)}

/* Section title */
.sec-title{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
<div class="login-card">
<div class="logo"><h1>Shinra Tracker</h1><p>Performance Dashboard</p></div>
<input type="text" id="username" placeholder="Utilisateur" autocomplete="username">
<input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()">
<button class="btn" onclick="doLogin()">Connexion</button>
<p class="login-err" id="loginErr">Identifiants incorrects</p>
</div>
</div>
<div class="app" id="app">
<div class="topbar">
<div class="brand" id="brandTitle">Shinra Tracker</div>
<div class="right">
<div class="plat-switch" id="platSwitch"></div>
<span class="user" id="curUser"></span>
<button class="logout" onclick="doLogout()">Deconnexion</button>
</div>
</div>
<div class="nav">
<div class="nav-item on" onclick="go('dash',this)">Dashboard</div>
<div class="nav-item" onclick="go('lb',this)">Classement</div>
<div class="nav-item" onclick="go('top',this)">Top Posts</div>
<div class="nav-item" onclick="go('reco',this)">Recommandations</div>
<div class="nav-item" onclick="go('saved',this)">Pepites</div>
<div class="nav-item" onclick="go('heat',this)">Heures</div>
<div class="nav-item" onclick="go('evolution',this)">Evolution</div>
<div class="nav-item" onclick="go('global',this)">Global</div>
</div>
<div class="main" id="content"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<script>
var T=localStorage.getItem('dt'),A='',VAS=[];
var PLAT=localStorage.getItem('dp')||'instagram';
var ALLOWED_PLATS=JSON.parse(localStorage.getItem('dap')||'["instagram"]');
var USER_ROLE=localStorage.getItem('dr')||'va';
if(T)showApp();

function doLogin(){var u=document.getElementById('username').value,p=document.getElementById('password').value;fetch(A+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})}).then(function(r){return r.json()}).then(function(d){if(d.token){T=d.token;localStorage.setItem('dt',T);localStorage.setItem('du',d.username);localStorage.setItem('dr',d.role||'va');localStorage.setItem('dap',JSON.stringify(d.allowedPlatforms||['instagram']));ALLOWED_PLATS=d.allowedPlatforms||['instagram'];USER_ROLE=d.role||'va';PLAT=ALLOWED_PLATS[0]||'instagram';localStorage.setItem('dp',PLAT);showApp()}else{document.getElementById('loginErr').style.display='block'}}).catch(function(){document.getElementById('loginErr').style.display='block'})}
function doLogout(){localStorage.clear();location.reload()}

function switchPlatform(p){PLAT=p;localStorage.setItem('dp',p);updatePlatUI();var cur=document.querySelector('.nav-item.on');if(cur){var tab=cur.getAttribute('data-tab')||'dash';go(tab,cur)}}

function updatePlatUI(){
var sw=document.getElementById('platSwitch');sw.innerHTML='';
var plats=ALLOWED_PLATS.slice();
if(ALLOWED_PLATS.length>1)plats.unshift('all');
plats.forEach(function(p){var b=document.createElement('button');b.className='plat-btn'+(PLAT===p?(p==='twitter'?' active-tw':p==='all'?' active-all':' active-ig'):'');b.textContent=p==='twitter'?'🐦 Twitter':p==='all'?'📊 Global':'📸 Instagram';b.onclick=function(){switchPlatform(p)};sw.appendChild(b)});
var accentCol=PLAT==='twitter'?'var(--twitter)':PLAT==='all'?'var(--purple)':'var(--pink)';
document.documentElement.style.setProperty('--accent',accentCol);
var titles={instagram:'Shinra — Instagram',twitter:'Shinra — Twitter',all:'Shinra — Global'};
document.getElementById('brandTitle').textContent=titles[PLAT]||'Shinra Tracker'}

function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';document.getElementById('curUser').textContent=localStorage.getItem('du')||'';ALLOWED_PLATS=JSON.parse(localStorage.getItem('dap')||'["instagram"]');USER_ROLE=localStorage.getItem('dr')||'va';if(ALLOWED_PLATS.indexOf(PLAT)===-1)PLAT=ALLOWED_PLATS[0]||'instagram';updatePlatUI();go('dash',document.querySelector('.nav-item'))}

function af(u){var sep=u.indexOf('?')!==-1?'&':'?';var platParam=PLAT==='all'?'':sep+'platform='+PLAT;var url=A+u+(PLAT==='all'?'':platParam);return fetch(url,{headers:{'X-Auth-Token':T}}).then(function(r){if(r.status===401){doLogout();throw new Error('x')}return r.json()})}

function go(t,el){document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('on')});if(el){el.classList.add('on');el.setAttribute('data-tab',t)}
if(t==='dash')loadDash();else if(t==='lb')loadLB();else if(t==='top')loadTop();else if(t==='reco')loadReco();else if(t==='saved')loadSaved();else if(t==='heat')loadHeat();else if(t==='evolution')loadEvolution();else if(t==='global')loadGlobal()}

// Helpers
function fm(n){return n==null?'0':Number(n).toLocaleString('fr-FR')}
function platEmoji(){return PLAT==='twitter'?'🐦':PLAT==='all'?'📊':'📸'}
function platLabel(){return PLAT==='twitter'?'Twitter':PLAT==='all'?'Global':'Instagram'}
function platLinkLabel(p){p=p||PLAT;return p==='twitter'?'Twitter ↗':'Instagram ↗'}
function perfBadge(p){var m={viral:'🔥 VIRAL',bon:'✅ BON',moyen:'➡️ MOYEN',flop:'⬇️ FLOP'};return'<span class="perf-badge perf-'+(p||'flop')+'">'+(m[p]||'⬇️ FLOP')+'</span>'}
function vaBadge(b){var c={top:'badge-top',bon:'badge-bon',faible:'badge-faible'};var m={top:'⭐ Top',bon:'👍 Bon',faible:'📉 Faible'};return'<span class="'+(c[b]||'badge-faible')+'">'+(m[b]||'📉 Faible')+'</span>'}
function perfColor(p){return{viral:'#ff00ff',bon:'#10b981',moyen:'#f59e0b',flop:'#ef4444'}[p]||'#ef4444'}
function scoreOf(s){return(Number(s.likes)||0)+(Number(s.comments)||0)*3+(Number(s.shares)||0)*5}
function engOf(s){var v=Number(s.views)||0;if(!v)return 0;return((Number(s.likes)||0)+(Number(s.comments)||0))/v}
function perfOf(v){if(v>=5000)return'viral';if(v>=1000)return'bon';if(v>=300)return'moyen';return'flop'}
function kpi(icon,val,lbl,sub,color){var colors={pink:'var(--accent)',blue:'var(--blue)',purple:'var(--purple)',green:'var(--green)',orange:'var(--orange)',red:'var(--red)'};var c=colors[color]||'var(--accent)';return'<div class="kpi"><div class="icon">'+icon+'</div><div class="val" style="color:'+c+'">'+val+'</div><div class="lbl">'+lbl+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'<div style="position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:'+c+';opacity:0.05"></div></div>'}
function gauge(pct){var r=48,c=2*Math.PI*r,off=c-(pct/100)*c;var col=pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)';return'<div class="gauge-wrap"><div class="gauge"><svg width="110" height="110"><circle cx="55" cy="55" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="8"/><circle cx="55" cy="55" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" stroke-linecap="round"/></svg><div class="gauge-text"><div class="pct" style="color:'+col+'">'+pct+'%</div><div class="gsub">objectif</div></div></div></div>'}
function dDate(offset){var d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().split('T')[0]}
function destroyCharts(){(window._charts||[]).forEach(function(c){try{c.destroy()}catch(e){}});window._charts=[]}
function makeChart(id,cfg){var ctx=document.getElementById(id);if(!ctx)return null;var ch=new Chart(ctx,cfg);window._charts=window._charts||[];window._charts.push(ch);return ch}

// ==================== DASHBOARD ====================
var DASH_MODE='today';
function loadDash(){
var h='<div class="filters">';
['today','yesterday','7d','30d'].forEach(function(m){var labels={today:'Aujourd\'hui',yesterday:'Hier','7d':'7 jours','30d':'30 jours'};h+='<button class="btn-sm '+(DASH_MODE===m?'':'btn-off')+'" onclick="DASH_MODE=\''+m+'\';loadDashData()">'+labels[m]+'</button>'});
h+='<input type="date" id="dashDate" value="'+dDate(0)+'">';
h+='<button class="btn-sm btn-off" onclick="DASH_MODE=\'custom\';loadDashData()">Charger</button>';
h+='</div><div id="dashArea"><p style="color:var(--text3);text-align:center;padding:60px">Chargement...</p></div>';
document.getElementById('content').innerHTML=h;loadDashData()}

function loadDashData(){
destroyCharts();
if(DASH_MODE==='7d'||DASH_MODE==='30d'){loadMultiDay(DASH_MODE==='7d'?7:30);return}
var date=DASH_MODE==='yesterday'?dDate(-1):DASH_MODE==='custom'?(document.getElementById('dashDate')||{}).value||dDate(0):dDate(0);
af('/api/stats/'+date).then(function(d){
var s=d.summaries.map(function(x){var tv=Number(x.total_views),tl=Number(x.total_likes),tc=Number(x.total_comments),ts=Number(x.total_shares||0),pc=Number(x.post_count);x.avg_views=pc>0?Math.round(tv/pc):0;x.total_score=tl+tc*3+ts*5;x.engagement_rate=tv>0?((tl+tc)/tv*100).toFixed(1):'0.0';x.badge=x.avg_views>=2000?'top':x.avg_views>=500?'bon':'faible';return x}).sort(function(a,b){return Number(b.total_views)-Number(a.total_views)});
var tv=0,tl=0,tc=0,ts=0,tp=0,tsc=0;

makeChart('evoLikes',lineCfg(daily.map(function(x){return x.likes}),'rgb(225,48,108)'));
makeChart('evoEng',lineCfg(daily.map(function(x){return+x.eng.toFixed(2)}),'rgb(16,185,129)'));
makeChart('evoPosts',lineCfg(daily.map(function(x){return x.posts}),'rgb(59,130,246)'))})}

// ==================== GLOBAL (NEW — combined IG + Twitter) ====================
function loadGlobal(){destroyCharts();
if(ALLOWED_PLATS.length<2){document.getElementById('content').innerHTML='<div class="card"><p style="color:var(--text3);text-align:center;padding:40px">La vue Global necessite les deux plateformes (Instagram + Twitter).</p></div>';return}
var h='<div class="filters"><input type="date" id="globalDate" value="'+dDate(0)+'"><button class="btn-sm" onclick="loadGlobalData()">Charger</button></div><div id="globalArea"><p style="color:var(--text3);text-align:center;padding:60px">Chargement...</p></div>';document.getElementById('content').innerHTML=h;loadGlobalData()}
function loadGlobalData(){destroyCharts();var date=(document.getElementById('globalDate')||{value:dDate(0)}).value;
Promise.all([
fetch(A+'/api/stats/'+date+'?platform=instagram',{headers:{'X-Auth-Token':T}}).then(function(r){return r.json()}),
fetch(A+'/api/stats/'+date+'?platform=twitter',{headers:{'X-Auth-Token':T}}).then(function(r){return r.json()})
]).then(function(res){
var ig=res[0].summaries,tw=res[1].summaries;
function sum(arr,k){return arr.reduce(function(a,b){return a+Number(b[k]||0)},0)}
var igV=sum(ig,'total_views'),igL=sum(ig,'total_likes'),igC=sum(ig,'total_comments'),igP=sum(ig,'post_count');
var twV=sum(tw,'total_views'),twL=sum(tw,'total_likes'),twC=sum(tw,'total_comments'),twP=sum(tw,'post_count');
var totV=igV+twV,totL=igL+twL,totC=igC+twC,totP=igP+twP;
var h='<div class="sec-title">📊 Vue Globale — '+date+'</div>';
h+='<div class="kpis">';
h+=kpi('📊',fm(totV),'Vues totales','IG+TW','purple');
h+=kpi('❤️',fm(totL),'Likes totaux','','pink');
h+=kpi('📝',''+totP,'Posts totaux','','blue');
h+=kpi('📸',fm(igV),'Vues Instagram','','pink');
h+=kpi('🐦',fm(twV),'Vues Twitter','','blue');
h+='</div>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
h+='<div class="card"><h3><span class="dot" style="background:var(--pink)"></span>Repartition vues</h3><div class="chart-wrap"><canvas id="globalPie"></canvas></div></div>';
h+='<div class="card"><h3><span class="dot" style="background:var(--blue)"></span>Comparaison</h3><div class="chart-wrap"><canvas id="globalBar"></canvas></div></div>';
h+='</div>';

// Tables cote a cote
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
h+='<div class="card" style="border-top:2px solid var(--pink)"><h3>📸 Instagram — '+ig.length+' VA</h3><table class="tbl"><thead><tr><th>VA</th><th>Vues</th><th>Likes</th><th>Posts</th></tr></thead><tbody>';
ig.sort(function(a,b){return Number(b.total_views)-Number(a.total_views)}).forEach(function(x){h+='<tr><td><b>'+x.va_name+'</b></td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+x.post_count+'/6</td></tr>'});
h+='</tbody></table></div>';
h+='<div class="card" style="border-top:2px solid var(--twitter)"><h3>🐦 Twitter — '+tw.length+' VA</h3><table class="tbl"><thead><tr><th>VA</th><th>Vues</th><th>Likes</th><th>Posts</th></tr></thead><tbody>';
tw.sort(function(a,b){return Number(b.total_views)-Number(a.total_views)}).forEach(function(x){h+='<tr><td><b>'+x.va_name+'</b></td><td>'+fm(Number(x.total_views))+'</td><td>'+fm(Number(x.total_likes))+'</td><td>'+x.post_count+'/6</td></tr>'});
h+='</tbody></table></div></div>';

document.getElementById('globalArea').innerHTML=h;
makeChart('globalPie',{type:'doughnut',data:{labels:['Instagram','Twitter'],datasets:[{data:[igV,twV],backgroundColor:['rgba(225,48,108,0.8)','rgba(29,161,242,0.8)'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11}}}}}});
makeChart('globalBar',{type:'bar',data:{labels:['Vues','Likes','Posts'],datasets:[{label:'Instagram',data:[igV,igL,igP],backgroundColor:'rgba(225,48,108,0.7)',borderRadius:6},{label:'Twitter',data:[twV,twL,twP],backgroundColor:'rgba(29,161,242,0.7)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:{x:{grid:{display:false},ticks:{color:'#64748b'}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b'}}}}})})}

// ==================== VA DETAIL MODAL (with full post timeline) ====================
function openVA(id,name){var date=dDate(0);if(document.getElementById('lbDate'))date=document.getElementById('lbDate').value||date;
af('/api/va/'+id+'?date='+date).then(function(d){
var h='<h2>'+name+' <button class="close" onclick="closeModal()">✕</button></h2>';
if(d.stats){var tv=Number(d.stats.total_views),tl=Number(d.stats.total_likes),tc=Number(d.stats.total_comments);var eng=tv>0?((tl+tc)/tv*100).toFixed(1):'0.0';var score=tl+tc*3;var avgV=Number(d.stats.post_count)>0?Math.round(tv/Number(d.stats.post_count)):0;var badge=avgV>=2000?'top':avgV>=500?'bon':'faible';
h+='<div style="margin-bottom:16px">'+vaBadge(badge)+'</div>';
h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">';
h+='<div class="kpi" style="padding:12px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Posts</div><div style="font-size:18px;font-weight:800">'+d.stats.post_count+'/6</div></div>';
h+='<div class="kpi" style="padding:12px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Vues</div><div style="font-size:18px;font-weight:800;color:var(--purple)">'+fm(tv)+'</div></div>';
h+='<div class="kpi" style="padding:12px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Likes</div><div style="font-size:18px;font-weight:800;color:var(--accent)">'+fm(tl)+'</div></div>';
h+='<div class="kpi" style="padding:12px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Score</div><div style="font-size:18px;font-weight:800;color:var(--orange)">'+fm(score)+'</div></div>';
h+='<div class="kpi" style="padding:12px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Eng.</div><div style="font-size:18px;font-weight:800;color:var(--green)">'+eng+'%</div></div></div>'}

d.posts.forEach(function(p,idx){var last=p.snapshots.length>0?p.snapshots[p.snapshots.length-1]:{views:0,likes:0,comments:0,shares:0};var perf=p.performance||perfOf(Number(last.views));var score=p.score||scoreOf(last);var eng=p.engagement||engOf(last);var platform=p.post.platform||PLAT;
h+='<div class="post-card" style="border-left:2px solid '+perfColor(perf)+'"><div class="post-header"><div><span style="font-weight:700">Post '+(idx+1)+'</span> '+perfBadge(perf)+'<div style="font-size:10px;color:var(--text3);margin-top:3px">'+new Date(p.post.created_at).toLocaleString('fr-FR')+'</div></div><a href="'+p.post.url+'" target="_blank" class="post-link" style="color:var(--accent);border-color:var(--accent)">'+platLinkLabel(platform)+'</a></div>';
h+='<div class="post-stats"><span>👁️ '+fm(last.views)+'</span><span>❤️ '+fm(last.likes)+'</span><span>💬 '+fm(last.comments)+'</span><span>🏆 '+fm(score)+'</span><span>📊 '+(eng*100).toFixed(1)+'%</span></div>';
if(p.milestones){h+='<div style="display:flex;gap:8px;margin-top:12px"><div class="milestone"><div class="ms-val">'+(p.milestones.h1!=null?fm(p.milestones.h1):'-')+'</div><div class="ms-lbl">1h</div></div><div class="milestone"><div class="ms-val">'+(p.milestones.h3!=null?fm(p.milestones.h3):'-')+'</div><div class="ms-lbl">3h</div></div><div class="milestone"><div class="ms-val">'+(p.milestones.h6!=null?fm(p.milestones.h6):'-')+'</div><div class="ms-lbl">6h</div></div></div>'}
// Full timeline table
if(p.snapshots.length>1){h+='<div style="margin-top:14px"><div style="font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700">Timeline complete</div><table class="tbl" style="font-size:11px"><thead><tr><th>Heure</th><th>Vues</th><th>Likes</th><th>Comm.</th><th>Δ Vues</th></tr></thead><tbody>';
p.snapshots.forEach(function(s,si){var time=new Date(s.scraped_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});var prevV=si>0?Number(p.snapshots[si-1].views):0;var delta=Number(s.views)-prevV;var deltaStr=si===0?'-':(delta>=0?'+':'')+fm(delta);var deltaCol=delta>0?'var(--green)':delta<0?'var(--red)':'var(--text3)';h+='<tr><td>'+time+'</td><td>'+fm(s.views)+'</td><td>'+fm(s.likes)+'</td><td>'+fm(s.comments)+'</td><td style="color:'+deltaCol+';font-weight:600">'+deltaStr+'</td></tr>'});
h+='</tbody></table></div>'}
h+='</div>'});
if(d.posts.length===0)h+='<p style="color:var(--text3);text-align:center;padding:30px">Aucun post ce jour</p>';
document.getElementById('modalContent').innerHTML=h;document.getElementById('modalBg').classList.add('show')})}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}

setInterval(function(){var a=document.querySelector('.nav-item.on');if(a&&(a.getAttribute('data-tab')==='dash')&&DASH_MODE==='today')loadDashData()},60000);
</script>
